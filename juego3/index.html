<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realm Quest VIP - Action RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        /* PANTALLA DE CARGA */
        .loading-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            border: 3px solid #ffd700;
        }

        .loading-container h1 {
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ffd700;
        }

        .loading-bar {
            width: 300px;
            height: 20px;
            background: #333;
            border: 2px solid #ffd700;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            width: 0%;
            animation: loading 2s ease-in-out forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* PANTALLA DE INICIO */
        .start-container {
            background: rgba(0, 0, 0, 0.95);
            padding: 50px;
            border-radius: 15px;
            border: 3px solid #ffd700;
            text-align: center;
            max-width: 700px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .start-container h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ffd700;
        }

        .start-container p {
            font-size: 1.1em;
            margin-bottom: 30px;
            color: #ccc;
        }

        .character-selection h2 {
            margin: 30px 0 20px;
            font-size: 1.3em;
        }

        .heroes {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid #ffd700;
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            flex: 1;
            min-width: 150px;
        }

        .hero-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ffd700;
        }

        .hero-btn.selected {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 0 20px #f5576c;
        }

        .hero-btn small {
            display: block;
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 5px;
        }

        #playerName {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ffd700;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 5px;
            font-size: 1em;
        }

        #playerName::placeholder {
            color: #999;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.5);
        }

        /* PANTALLA PRINCIPAL */
        .game-container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
        }

        .left-panel, .center-panel, .right-panel {
            background: rgba(20, 30, 50, 0.8);
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
        }

        .left-panel {
            flex: 0 0 280px;
        }

        .center-panel {
            flex: 1;
        }

        .right-panel {
            flex: 0 0 280px;
        }

        /* Tarjeta de Jugador */
        .player-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(100, 200, 255, 0.1));
            border: 2px solid #ffd700;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .player-card h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
        }

        .stat label {
            color: #aaa;
        }

        .stat span {
            color: #ffd700;
            font-weight: bold;
        }

        /* Barras */
        .bar-container {
            margin-bottom: 15px;
        }

        .bar-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #aaa;
        }

        .health-bar, .mana-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border: 1px solid #666;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8844);
            width: 100%;
            transition: width 0.3s;
        }

        .mana-fill {
            height: 100%;
            background: linear-gradient(90deg, #4488ff, #88ccff);
            width: 100%;
            transition: width 0.3s;
        }

        .bar-container span {
            display: block;
            text-align: right;
            font-size: 0.8em;
            color: #aaa;
        }

        /* Secciones */
        .inventory, .abilities, .quests-container, .combat-log {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .inventory h4, .abilities h4, .quests-container h4, .combat-log h4 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .inventory-item, .ability-item, .quest-item, .log-item {
            background: rgba(100, 150, 255, 0.2);
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            border-left: 3px solid #ffd700;
            font-size: 0.85em;
        }

        .ability-item, .quest-item {
            cursor: pointer;
            transition: all 0.2s;
        }

        .ability-item:hover, .quest-item:hover {
            background: rgba(100, 150, 255, 0.4);
            transform: translateX(5px);
        }

        /* Centro - Misiones */
        .mission-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .mission-card {
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.2), rgba(150, 100, 255, 0.2));
            border: 2px solid #64c8ff;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mission-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(100, 200, 255, 0.3);
        }

        .mission-card h3 {
            color: #64c8ff;
            margin-bottom: 8px;
        }

        .mission-card p {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 8px;
        }

        .mission-card button {
            background: #64c8ff;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .mission-card button:hover {
            background: #fff;
        }

        /* Batalla */
        .battle-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
        }

        .enemies-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 5px;
            border: 2px solid #ff6464;
        }

        .enemies-section h3 {
            color: #ff6464;
            margin-bottom: 10px;
        }

        .enemy-card {
            background: rgba(255, 100, 100, 0.2);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid #ff6464;
        }

        .enemy-name {
            font-weight: bold;
            color: #ff9999;
            margin-bottom: 5px;
        }

        .enemy-health {
            width: 100%;
            height: 15px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .enemy-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8844);
            transition: width 0.3s;
        }

        .combat-log {
            flex: 1;
            overflow-y: auto;
            max-height: 200px;
        }

        .log-item {
            padding: 6px;
            margin-bottom: 4px;
            font-size: 0.8em;
        }

        .log-item.damage {
            border-left-color: #ff4444;
        }

        .log-item.heal {
            border-left-color: #44ff44;
        }

        .log-item.enemy {
            border-left-color: #ff9999;
        }

        .log-item.levelup {
            border-left-color: #ffd700;
        }

        .actions-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 5px;
        }

        .actions-section h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: 2px solid #ffd700;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #ffd700;
        }

        .zone-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ffd700;
        }

        .zone-header h2 {
            color: #ffd700;
            margin-bottom: 8px;
        }

        .zone-header p {
            color: #aaa;
            font-size: 0.9em;
        }

        .hidden {
            display: none !important;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffed4e;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- Pantalla de Carga -->
    <div id="loadingScreen" class="screen active">
        <div class="loading-container">
            <h1>⚔️ REALM QUEST VIP ⚔️</h1>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <p>Cargando tu aventura...</p>
        </div>
    </div>

    <!-- Pantalla de Inicio -->
    <div id="startScreen" class="screen">
        <div class="start-container">
            <h1>⚔️ REALM QUEST VIP ⚔️</h1>
            <p>Bienvenido, viajero. Un mal antiguo amenaza el reino.</p>
            <div class="character-selection">
                <h2>Elige tu Héroe:</h2>
                <div class="heroes">
                    <button class="hero-btn" data-class="warrior">
                        🛡️ Guerrero<br><small>Fuerza: +20% | Defensa: +15%</small>
                    </button>
                    <button class="hero-btn" data-class="mage">
                        🔮 Mago<br><small
