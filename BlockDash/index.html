<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOCK DASH - MINGUELASGO</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #00ffcc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* UI de Puntuación con efecto Neón */
        .score-ui {
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            letter-spacing: 2px;
        }

        canvas {
            background: #000;
            border: 3px solid #00ffcc;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            text-transform: uppercase;
        }

        /* Menú de Pausa Mejorado */
        #pauseMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ffcc;
            text-align: center;
            display: none;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        }

        #pauseMenu h2 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffcc;
            font-size: 28px;
        }

        button {
            display: block;
            width: 200px;
            padding: 12px;
            margin: 12px auto;
            background: transparent;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px #00ffcc;
            transform: scale(1.05);
        }

        button.exit {
            border-color: #ff4444;
            color: #ff4444;
        }

        button.exit:hover {
            background: #ff4444;
            color: white;
            box-shadow: 0 0 20px #ff4444;
        }
    </style>
</head>

<body>

    <div class="score-ui">SCORE: <span id="score">0</span></div>

    <canvas id="game" width="400" height="500"></canvas>

    <div class="controls-hint">
        [A / D] MOVER • [P / ESC] PAUSA
    </div>

    <div id="pauseMenu">
        <h2>PAUSA</h2>
        <button onclick="togglePause()">REANUDAR</button>
        <button onclick="restartGame()">REINICIAR</button>
        <button class="exit" onclick="goToMenu()">SALIR AL MENÚ</button>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const pauseMenu = document.getElementById("pauseMenu");

        let score = 0;
        let isPaused = false;
        let gameOver = false;

        const player = { x: 180, y: 440, w: 40, h: 40, speed: 8 };
        const enemy = { x: Math.random() * 360, y: -40, w: 40, h: 40, speed: 4 };
        const keys = {};

        window.addEventListener("keydown", (e) => {
            keys[e.key] = true;
            if (e.key.toLowerCase() === "p" || e.key === "Escape") togglePause();
        });

        window.addEventListener("keyup", (e) => keys[e.key] = false);

        function togglePause() {
            if (gameOver) return;
            isPaused = !isPaused;
            pauseMenu.style.display = isPaused ? "block" : "none";
            if (!isPaused) loop();
        }

        function restartGame() {
            location.reload();
        }

        // FUNCIÓN CORREGIDA PARA VOLVER AL MENÚ PRINCIPAL
        function goToMenu() {
            window.location.href = "../index.html"; 
        }

        function drawPlayer() {
            ctx.fillStyle = "#00ffcc";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00ffcc";
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }

        function drawEnemy() {
            ctx.fillStyle = "#ff4444";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff4444";
            ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
        }

        function movePlayer() {
            if (keys["ArrowLeft"] || keys["a"] || keys["A"]) player.x -= player.speed;
            if (keys["ArrowRight"] || keys["d"] || keys["D"]) player.x += player.speed;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
        }

        function moveEnemy() {
            enemy.y += enemy.speed;
            if (enemy.y > canvas.height) {
                enemy.y = -40;
                enemy.x = Math.random() * (canvas.width - enemy.w);
                score++;
                scoreElement.textContent = score;
                enemy.speed += 0.3;
            }
        }

        function checkCollision() {
            return (
                player.x < enemy.x + enemy.w &&
                player.x + player.w > enemy.x &&
                player.y < enemy.y + enemy.h &&
                player.y + player.h > enemy.y
            );
        }

        function endGame() {
            gameOver = true;
            isPaused = true;
            setTimeout(() => {
                alert("¡GAME OVER!\nPuntuación final: " + score);
                location.reload();
            }, 100);
        }

        function loop() {
            if (isPaused || gameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            movePlayer();
            moveEnemy();
            drawPlayer();
            drawEnemy();
            ctx.shadowBlur = 0; // Reset para rendimiento
            if (checkCollision()) {
                endGame();
                return;
            }
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
