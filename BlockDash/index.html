<!-- =========================
NUEVOS DATOS SAVE
========================= -->

<script>

/* =========================
   CÓDIGOS DE RECOMPENSA
========================= */

const rewardCodes = {

    "CHAOS2026":{
        coins:500,
        skin:"galaxy",
        reward:"500 monedas + skin GALAXY"
    },

    "GODMODE":{
        coins:1500,
        skin:"god",
        reward:"1500 monedas + skin GOD"
    },

    "RAINBOWX":{
        coins:800,
        skin:"rainbow",
        reward:"800 monedas + skin RAINBOW"
    },

    "VOIDPOWER":{
        coins:1000,
        skin:"void",
        reward:"1000 monedas + skin VOID"
    },

    "CYBERX":{
        coins:1200,
        skin:"cyber",
        reward:"1200 monedas + skin CYBER"
    }

};

let usedCodes =
JSON.parse(localStorage.getItem("usedCodes"))
|| [];


/* =========================
   NUEVOS MODIFICADORES
========================= */

modifiers.push(
    "LASER MODE",
    "DOUBLE ENEMY",
    "INVISIBLE PLAYER",
    "MAGNET MODE",
    "BOUNCY MODE",
    "ULTRA CHAOS",
    "PIXEL MODE",
    "RANDOM SIZE",
    "DISCO MODE",
    "FROZEN SCREEN"
);


/* =========================
   POWERUPS COMPRABLES
========================= */

const powerups = {

    shield:{
        name:"ESCUDO",
        price:250,
        description:"Te salva de 1 choque"
    },

    slow:{
        name:"RALENTIZADOR",
        price:180,
        description:"Reduce velocidad enemiga"
    },

    tiny:{
        name:"MINI PLAYER",
        price:220,
        description:"Jugador pequeño"
    },

    rich:{
        name:"X2 MONEDAS",
        price:400,
        description:"Duplica recompensas"
    }

};

let inventory =
JSON.parse(localStorage.getItem("inventory"))
|| [];


/* =========================
   ESCUDO
========================= */

let shieldActive = false;
let doubleCoins = false;


/* =========================
   INPUT CÓDIGOS
========================= */

const codeDiv = document.createElement("div");

codeDiv.className = "card";

codeDiv.innerHTML = `

<b>CANJEAR CÓDIGO</b>

<input
id="rewardCode"
placeholder="Escribe un código"
style="
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#111;
color:#00ffcc;
"
/>

<button onclick="redeemCode()">
CANJEAR
</button>

`;

document.querySelector(".side-ui")
.appendChild(codeDiv);


/* =========================
   CANJEAR CÓDIGOS
========================= */

function redeemCode(){

    const input =
    document.getElementById("rewardCode");

    const code =
    input.value.toUpperCase().trim();

    if(!rewardCodes[code]){

        alert("CÓDIGO INVÁLIDO");
        return;
    }

    if(usedCodes.includes(code)){

        alert("YA USASTE ESTE CÓDIGO");
        return;
    }

    const reward = rewardCodes[code];

    coins += reward.coins;

    if(reward.skin &&
    !ownedSkins.includes(reward.skin)){

        ownedSkins.push(reward.skin);
    }

    usedCodes.push(code);

    localStorage.setItem(
        "usedCodes",
        JSON.stringify(usedCodes)
    );

    localStorage.setItem(
        "ownedSkins",
        JSON.stringify(ownedSkins)
    );

    localStorage.setItem(
        "chaosCoins",
        coins
    );

    updateUI();
    generateShop();

    alert("RECOMPENSA:\n" + reward.reward);

    input.value = "";
}


/* =========================
   TIENDA MEJORADA
========================= */

const oldGenerateShop = generateShop;

generateShop = function(){

    shopContainer.innerHTML = "";

    /* ========= SKINS ========= */

    for(let skin in skins){

        const data = skins[skin];

        const div =
        document.createElement("div");

        div.className = "shop-item";

        div.innerHTML = `

        <div class="skin-preview"
        style="
        background:
        ${data.color === "rainbow"
        ? "linear-gradient(45deg,red,orange,yellow,lime,cyan,blue,purple)"
        : data.color};

        box-shadow:0 0 20px ${data.glow};
        ">
        </div>

        <b>${skin.toUpperCase()}</b><br>
        ${data.price} monedas

        <button onclick="
        ${ownedSkins.includes(skin)
        ? `equipSkin('${skin}')`
        : `buySkin('${skin}',${data.price})`}
        ">
        ${ownedSkins.includes(skin)
        ? "EQUIPAR"
        : "COMPRAR"}
        </button>
        `;

        shopContainer.appendChild(div);
    }

    /* ========= POWERUPS ========= */

    const title =
    document.createElement("h2");

    title.innerHTML =
    "MODIFICADORES ESPECIALES";

    shopContainer.appendChild(title);

    for(let key in powerups){

        const item = powerups[key];

        const div =
        document.createElement("div");

        div.className = "shop-item";

        div.innerHTML = `

        <b>${item.name}</b><br>
        ${item.description}<br><br>

        ${item.price} monedas

        <button onclick="
        buyPowerup('${key}',${item.price})
        ">
        COMPRAR
        </button>

        `;

        shopContainer.appendChild(div);
    }
};


/* =========================
   COMPRAR POWERUPS
========================= */

function buyPowerup(name,price){

    if(coins < price){

        alert("NO TIENES MONEDAS");
        return;
    }

    coins -= price;

    inventory.push(name);

    localStorage.setItem(
        "inventory",
        JSON.stringify(inventory)
    );

    localStorage.setItem(
        "chaosCoins",
        coins
    );

    updateUI();

    alert("COMPRADO");
}


/* =========================
   ACTIVAR POWERUPS
========================= */

function activateInventory(){

    shieldActive = false;
    doubleCoins = false;

    if(inventory.includes("shield")){

        shieldActive = true;
    }

    if(inventory.includes("slow")){

        enemy.multiplier *= 0.7;
    }

    if(inventory.includes("tiny")){

        player.w = 25;
        player.h = 25;
    }

    if(inventory.includes("rich")){

        doubleCoins = true;
    }
}

activateInventory();


/* =========================
   NUEVOS EFECTOS MODIFICADOR
========================= */

const oldActivateModifier =
activateModifier;

activateModifier = function(){

    oldActivateModifier();

    switch(currentModifier){

        case "LASER MODE":

            document.body.style.boxShadow =
            "inset 0 0 100px red";

        break;

        case "DOUBLE ENEMY":

            enemy.multiplier = 3;

        break;

        case "INVISIBLE PLAYER":

            ctx.globalAlpha = 0.2;

        break;

        case "MAGNET MODE":

            player.speed = 14;

        break;

        case "BOUNCY MODE":

            enemy.x +=
            Math.sin(Date.now()/50)*15;

        break;

        case "ULTRA CHAOS":

            player.speed = 20;
            enemy.multiplier = 5;

        break;

        case "PIXEL MODE":

            canvas.style.imageRendering =
            "pixelated";

        break;

        case "RANDOM SIZE":

            player.w =
            20 + Math.random()*80;

            player.h =
            player.w;

        break;

        case "DISCO MODE":

            document.body.style.filter =
            `hue-rotate(${Math.random()*360}deg)`;

        break;

        case "FROZEN SCREEN":

            enemy.multiplier = 0.2;

        break;
    }
};


/* =========================
   ESCUDO EN COLISIÓN
========================= */

const oldCollision = collision;

collision = function(){

    if(oldCollision()){

        if(shieldActive){

            shieldActive = false;

            inventory =
            inventory.filter(
            i => i !== "shield"
            );

            localStorage.setItem(
                "inventory",
                JSON.stringify(inventory)
            );

            enemy.y = -100;

            alert("ESCUDO ACTIVADO");

            return false;
        }

        return true;
    }

    return false;
};


/* =========================
   DOBLE MONEDAS
========================= */

const oldEndGame = endGame;

endGame = function(){

    if(doubleCoins){

        score *= 2;
    }

    oldEndGame();
};


/* =========================
   GENERAR TIENDA NUEVA
========================= */

generateShop();

</script>
