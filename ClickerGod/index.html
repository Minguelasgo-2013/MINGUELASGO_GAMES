
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b10;--surface:#111420;--surface2:#181c2e;--border:#1e2340;
  --accent:#00e5ff;--accent2:#ff9500;--text:#e8ecff;--muted:#5a607a;
  --success:#00e676;--danger:#ff3d57;
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;font-size:13px}
h1{font-family:'Space Mono',monospace;font-size:18px;letter-spacing:0.1em;color:var(--accent);margin:0}
header{text-align:center;margin-bottom:16px}
header span{font-size:10px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase}
.game-wrap{display:grid;grid-template-columns:260px 1fr;gap:14px;width:100%;max-width:860px}
.left{display:flex;flex-direction:column;gap:10px}
.coin-area{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative}
.prestige-crown{position:absolute;top:8px;right:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);display:none}
.coin-count{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--accent);text-align:center}
.coin-sub{font-size:11px;color:var(--muted);margin-top:-8px}
.coin-btn{width:120px;height:120px;border-radius:50%;background:var(--surface2);border:3px solid var(--border);font-size:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.07s,border-color 0.2s;user-select:none;position:relative;overflow:hidden}
.coin-btn:hover{border-color:var(--accent)}
.coin-btn:active{transform:scale(0.88)}
.coin-icon{font-size:44px;line-height:1}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:7px 9px}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
.stat-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.multiplier-bar{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px;font-size:11px;color:var(--muted);text-align:center;display:none}
.multiplier-bar span{color:var(--accent2);font-weight:700}
.right{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;max-height:600px}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface2)}
.tab-btn{flex:1;padding:10px 4px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;transition:color 0.2s;letter-spacing:0.02em}
.tab-btn.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-panel{display:none;overflow-y:auto;flex:1;padding:12px}
.tab-panel.active{display:block}
.section-hd{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin:12px 0 7px}
.section-hd:first-child{margin-top:0}
.shop-item{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:6px;transition:border-color 0.2s}
.shop-item:hover{border-color:#2d3360}
.item-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0;color:var(--accent)}
.item-info{flex:1;min-width:0}
.item-name{font-size:12px;font-weight:600;color:var(--text)}
.item-qty{font-size:10px;color:var(--accent);margin-left:4px}
.item-desc{font-size:10px;color:var(--muted);margin-top:2px}
.buy-btn{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--text);cursor:pointer;white-space:nowrap;transition:background 0.15s,border-color 0.15s}
.buy-btn:hover:not(:disabled){background:var(--border);border-color:var(--accent);color:var(--accent)}
.buy-btn:disabled{opacity:0.35;cursor:not-allowed}
.skin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.skin-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 6px;text-align:center;cursor:pointer;transition:border-color 0.2s}
.skin-card:hover{border-color:#2d3360}
.skin-card.active{border-color:var(--accent)}
.skin-card.locked{opacity:0.45}
.skin-emoji{font-size:28px;margin-bottom:4px}
.skin-name{font-size:10px;font-weight:600;color:var(--text)}
.skin-price{font-size:9px;color:var(--muted);margin-top:2px;font-family:'Space Mono',monospace}
.prestige-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:9px}
.prestige-card h3{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:7px}
.prestige-card p{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:7px}
.prestige-card .highlight{color:var(--text);font-weight:600}
.prestige-do-btn{width:100%;background:var(--surface);border:1px solid var(--accent2);border-radius:7px;padding:9px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--accent2);cursor:pointer;transition:background 0.15s}
.prestige-do-btn:hover:not(:disabled){background:rgba(255,149,0,0.1)}
.prestige-do-btn:disabled{opacity:0.35;cursor:not-allowed}
.mult-table{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.mult-cell{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 3px;text-align:center;font-size:10px}
.mult-cell .lv{color:var(--muted);font-size:9px}
.mult-cell .mx{font-family:'Space Mono',monospace;font-weight:700;color:var(--accent2);font-size:12px}
.mult-cell.current{border-color:var(--accent2)}
.ach-item{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:6px}
.ach-item.locked{opacity:0.35}
.ach-icon{font-size:20px;width:28px;text-align:center;color:var(--accent2)}
.ach-name{font-size:12px;font-weight:600;color:var(--text)}
.ach-desc{font-size:10px;color:var(--muted);margin-top:2px}
.ach-check{margin-left:auto;color:var(--success);font-size:14px}
.float-text{position:fixed;pointer-events:none;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);animation:floatUp 0.9s ease-out forwards;z-index:9999}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(0.8)}}
.reset-bar{border-top:1px solid var(--border);padding:0}
.reset-bar button{width:100%;background:none;border:none;padding:9px;font-size:10px;color:var(--muted);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:color 0.2s}
.reset-bar button:hover{color:var(--danger)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.code-area{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.code-area p{font-size:11px;color:var(--muted);margin-bottom:8px}
.code-row{display:flex;gap:7px}
.code-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:'Space Mono',monospace;font-size:12px;color:var(--text);outline:none;transition:border-color 0.2s}
.code-input:focus{border-color:var(--accent)}
.code-submit{background:var(--surface);border:1px solid var(--accent2);border-radius:7px;padding:7px 12px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--accent2);cursor:pointer;transition:background 0.15s}
.code-submit:hover{background:rgba(255,149,0,0.1)}
.code-msg{font-size:11px;margin-top:7px;font-weight:600;min-height:16px}
.code-msg.ok{color:var(--success)}
.code-msg.err{color:var(--danger)}
.used-codes{margin-top:9px}
.used-code-tag{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin:2px}
.vip-badge{display:none;background:linear-gradient(90deg,#ff9500,#ffcc00);color:#000;font-weight:700;font-size:10px;padding:2px 8px;border-radius:5px;letter-spacing:0.05em}
.vip-badge.show{display:inline-block}
.ti{font-family:"tabler-icons";font-style:normal;font-size:18px;line-height:1}
.notif{position:fixed;top:16px;right:16px;background:var(--surface);border:1px solid var(--accent2);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:var(--accent2);z-index:99999;animation:slideIn 0.3s ease-out;max-width:260px}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>

<header>
  <h1>COIN CLICKER</h1>
  <span>Minguelasgo Games &nbsp; <span class="vip-badge" id="vip-badge">VIP</span></span>
</header>

<div class="game-wrap">
  <div class="left">
    <div class="coin-area">
      <div class="prestige-crown" id="prestige-crown">* x<span id="crown-val">1</span></div>
      <div class="coin-count" id="coin-count">0</div>
      <div class="coin-sub">monedas</div>
      <div class="coin-btn" id="coin-btn" onclick="doClick(event)">
        <span class="coin-icon" id="coin-icon">&#9679;</span>
      </div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-label">Por segundo</div><div class="stat-val" id="s-mps">0</div></div>
        <div class="stat"><div class="stat-label">Por clic</div><div class="stat-val" id="s-cpc">1</div></div>
        <div class="stat"><div class="stat-label">Total ganadas</div><div class="stat-val" id="s-total">0</div></div>
        <div class="stat"><div class="stat-label">Prestigios</div><div class="stat-val" id="s-pres">0</div></div>
      </div>
    </div>
    <div class="multiplier-bar" id="mult-bar">
      Multiplicador de prestigio: <span id="mult-val">1x</span>
    </div>
  </div>

  <div class="right">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('shop',this)">Tienda</button>
      <button class="tab-btn" onclick="switchTab('skins',this)">Skins</button>
      <button class="tab-btn" onclick="switchTab('prestige',this)">Prestigio</button>
      <button class="tab-btn" onclick="switchTab('ach',this)">Logros</button>
      <button class="tab-btn" onclick="switchTab('codes',this)">Codigos</button>
    </div>

    <div class="tab-panel active" id="tab-shop"></div>
    <div class="tab-panel" id="tab-skins"></div>
    <div class="tab-panel" id="tab-prestige"></div>
    <div class="tab-panel" id="tab-ach"></div>
    <div class="tab-panel" id="tab-codes"></div>

    <div class="reset-bar">
      <button onclick="resetGame()">Reiniciar todo el progreso</button>
    </div>
  </div>
</div>

<script>
const UPGRADES=[
  {id:0,name:"Auto-Clic Base",icon:"A",priceBase:15,mps:0.5,desc:"+0.5 mon/seg"},
  {id:1,name:"Robot Minero",icon:"R",priceBase:100,mps:4,desc:"+4 mon/seg"},
  {id:2,name:"Fabrica Cuantica",icon:"F",priceBase:1100,mps:32,desc:"+32 mon/seg"},
  {id:3,name:"Servidor Nexo",icon:"S",priceBase:8000,mps:120,desc:"+120 mon/seg"},
  {id:4,name:"Portal Dimensional",icon:"P",priceBase:50000,mps:500,desc:"+500 mon/seg"},
  {id:5,name:"Singularidad IA",icon:"I",priceBase:300000,mps:2000,desc:"+2.000 mon/seg"},
  {id:6,name:"Red Neuronal Galactica",icon:"N",priceBase:2000000,mps:10000,desc:"+10.000 mon/seg"},
  {id:7,name:"Poder del Clic",icon:"C",priceBase:50,cpc:1,desc:"+1 por clic"},
  {id:8,name:"Guante de Plasma",icon:"G",priceBase:500,cpc:5,desc:"+5 por clic"},
  {id:9,name:"Mano Cosmica",icon:"M",priceBase:5000,cpc:20,desc:"+20 por clic"},
  {id:10,name:"Dedo Cuantico",icon:"D",priceBase:40000,cpc:100,desc:"+100 por clic"},
  {id:11,name:"Puno del Nexo",icon:"X",priceBase:250000,cpc:500,desc:"+500 por clic"},
];

const SKINS=[
  {id:"classic",icon:"&#9679;",name:"Clasica",cost:0,color:"#00e5ff"},
  {id:"gem",icon:"&#9670;",name:"Diamante",cost:500,color:"#88eeff"},
  {id:"fire",icon:"&#10022;",name:"Llamas",cost:2000,color:"#ff5500"},
  {id:"star",icon:"&#9733;",name:"Estrella",cost:5000,color:"#ffcc00"},
  {id:"alien",icon:"&#9824;",name:"Alienígena",cost:15000,color:"#00ff99"},
  {id:"nuke",icon:"&#9762;",name:"Nuclear",cost:40000,color:"#aaff00"},
  {id:"galaxy",icon:"&#10047;",name:"Galaxia",cost:100000,color:"#cc88ff"},
  {id:"rainbow",icon:"&#9678;",name:"Arcoiris",cost:300000,color:"#ff88cc"},
  {id:"void",icon:"&#9899;",name:"El Vacio",cost:800000,color:"#444488"},
  {id:"dragon",icon:"&#9770;",name:"Dragon",cost:2500000,color:"#ff3300"},
  {id:"god",icon:"&#10038;",name:"Divina",cost:10000000,color:"#ffdd00"},
  {id:"glitch",icon:"&#8481;",name:"Glitch",cost:50000000,color:"#ff00ff"},
];

const ACHIEVEMENTS=[
  {id:"click1",name:"Primer Clic",desc:"Haz tu primer clic manual",icon:"!",check:g=>g.totalClicks>=1},
  {id:"click50",name:"Dedos Agiles",desc:"Haz 50 clics manuales",icon:"!",check:g=>g.totalClicks>=50},
  {id:"click500",name:"Maratonista",desc:"Haz 500 clics manuales",icon:"!",check:g=>g.totalClicks>=500},
  {id:"click5000",name:"Robot Humano",desc:"Haz 5.000 clics manuales",icon:"!",check:g=>g.totalClicks>=5000},
  {id:"c100",name:"Centenar",desc:"Acumula 100 monedas",icon:"$",check:g=>g.totalCoins>=100},
  {id:"c10k",name:"Primer Millar",desc:"Gana 10.000 monedas en total",icon:"$",check:g=>g.totalCoins>=10000},
  {id:"c1m",name:"Millonario",desc:"Gana 1.000.000 en total",icon:"$",check:g=>g.totalCoins>=1000000},
  {id:"c1b",name:"Billonario",desc:"Gana 1.000.000.000 en total",icon:"$",check:g=>g.totalCoins>=1000000000},
  {id:"mps10",name:"Ingresos Pasivos",desc:"Alcanza 10 monedas/seg",icon:"~",check:g=>g.mps>=10},
  {id:"mps500",name:"Tormenta",desc:"Alcanza 500 monedas/seg",icon:"~",check:g=>g.mps>=500},
  {id:"mps5000",name:"Huracan de Oro",desc:"Alcanza 5.000 monedas/seg",icon:"~",check:g=>g.mps>=5000},
  {id:"buy5",name:"Comprador",desc:"Compra 5 tipos de mejoras distintas",icon:"+",check:g=>g.upgrades.filter(u=>u.qty>0).length>=5},
  {id:"buy10",name:"Adicto a Gastar",desc:"Compra 10 tipos de mejoras distintas",icon:"+",check:g=>g.upgrades.filter(u=>u.qty>0).length>=10},
  {id:"skin3",name:"Moda Nexo",desc:"Desbloquea 3 skins",icon:"*",check:g=>g.unlockedSkins.length>=3},
  {id:"skinall",name:"Coleccionista",desc:"Desbloquea todas las skins",icon:"*",check:g=>SKINS.every(s=>g.unlockedSkins.includes(s.id))},
  {id:"prestige1",name:"Renacimiento",desc:"Consigue tu primer prestigio",icon:"^",check:g=>g.prestiges>=1},
  {id:"prestige5",name:"Eterno Retorno",desc:"Consigue 5 prestigios",icon:"^",check:g=>g.prestiges>=5},
  {id:"vip",name:"VIP",desc:"Canjeaste un codigo VIP secreto",icon:"V",check:g=>g.isVip},
  {id:"hacker",name:"Hacker",desc:"Canjeaste 3 codigos distintos",icon:"H",check:g=>g.usedCodes&&g.usedCodes.length>=3},
  {id:"secretcode",name:"Curioso",desc:"Encontraste un codigo muy especial",icon:"?",check:g=>g.usedCodes&&g.usedCodes.includes("SECRETO")},
];

const PRESTIGE_MULT=[1,1.5,2,3,5,8,13,21,34,55];

// SECRET CODES
const SECRET_CODES={
  "MINGUELASGO":{coins:10000,msg:"Codigo del creador! +10.000 monedas"},
  "NEXO2025":{coins:5000,msg:"+5.000 monedas del futuro!"},
  "DOBLE":{multiplierBonus:true,msg:"Tu siguiente compra valdra el doble de produccion por 60s"},
  "MONEDASGRATIS":{coins:1000,msg:"+1.000 monedas gratis!"},
  "SECRETO":{coins:25000,skin:"star",msg:"Has encontrado el codigo MAS secreto! +25.000 monedas y skin Estrella"},
  "VIP":{vip:true,coins:2000,msg:"Eres VIP ahora! +2.000 monedas y badge especial"},
  "CLICKPOWER":{cpcBonus:10,msg:"+10 poder de clic permanente!"},
  "AUTOCLICK":{mpsBonus:50,msg:"+50 monedas/seg permanente!"},
  "PRESTIGE0":{coins:50000,msg:"Codigo de beta tester! +50.000 monedas"},
  "GALACTICO":{coins:100000,skin:"galaxy",msg:"CODIGO GALACTICO! +100.000 monedas y skin Galaxia"},
};

function defaultState(){
  return{
    coins:0,mps:0,cpc:1,totalCoins:0,totalClicks:0,
    prestiges:0,prestigeBonus:1,
    upgrades:UPGRADES.map(u=>({id:u.id,qty:0,price:u.priceBase})),
    unlockedSkins:["classic"],activeSkin:"classic",
    achievements:[],usedCodes:[],isVip:false
  };
}

let G=(()=>{
  try{const r=localStorage.getItem("clicker_mg_v4");return r?{...defaultState(),...JSON.parse(r)}:defaultState();}
  catch(e){return defaultState();}
})();

function save(){localStorage.setItem("clicker_mg_v4",JSON.stringify(G));}

function fmt(n){
  n=Math.floor(n);
  if(n>=1e12)return(n/1e12).toFixed(2)+"T";
  if(n>=1e9)return(n/1e9).toFixed(2)+"B";
  if(n>=1e6)return(n/1e6).toFixed(2)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"K";
  return n.toString();
}

function doClick(e){
  const gain=G.cpc*G.prestigeBonus;
  G.coins+=gain;G.totalCoins+=gain;G.totalClicks++;
  spawnFloat(e.clientX,e.clientY,"+"+fmt(gain));
  checkAch();updateUI();
}

function spawnFloat(x,y,text){
  const el=document.createElement("div");
  el.className="float-text";el.textContent=text;
  el.style.left=x+"px";el.style.top=(y-10)+"px";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

function showNotif(msg){
  const old=document.querySelector('.notif');if(old)old.remove();
  const el=document.createElement("div");
  el.className="notif";el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity="0";el.style.transition="opacity 0.4s";setTimeout(()=>el.remove(),400)},3000);
}

function buyUpgrade(idx){
  const s=G.upgrades[idx];const def=UPGRADES[idx];
  if(G.coins<s.price)return;
  G.coins-=s.price;s.qty++;
  s.price=Math.round(def.priceBase*Math.pow(1.15,s.qty));
  if(def.mps)G.mps+=def.mps*G.prestigeBonus;
  if(def.cpc)G.cpc+=def.cpc;
  checkAch();renderShop();updateUI();save();
}

function buySkin(id){
  const skin=SKINS.find(s=>s.id===id);if(!skin)return;
  if(!G.unlockedSkins.includes(id)){
    if(G.coins<skin.cost)return;
    G.coins-=skin.cost;G.unlockedSkins.push(id);
  }
  G.activeSkin=id;
  const ic=document.getElementById("coin-icon");
  if(ic){ic.innerHTML=skin.icon;ic.style.color=skin.color;}
  checkAch();renderSkins();updateUI();save();
}

function redeemCode(){
  const inp=document.getElementById("code-input");
  if(!inp)return;
  const code=inp.value.trim().toUpperCase();
  const msgEl=document.getElementById("code-msg");
  if(!code){msgEl.textContent="Escribe un codigo primero.";msgEl.className="code-msg err";return;}
  if(G.usedCodes.includes(code)){msgEl.textContent="Ya usaste este codigo.";msgEl.className="code-msg err";return;}
  const reward=SECRET_CODES[code];
  if(!reward){msgEl.textContent="Codigo invalido. Sigue buscando...";msgEl.className="code-msg err";inp.value="";return;}
  G.usedCodes.push(code);
  if(reward.coins){G.coins+=reward.coins;G.totalCoins+=reward.coins;}
  if(reward.vip){G.isVip=true;document.getElementById("vip-badge").className="vip-badge show";}
  if(reward.skin&&!G.unlockedSkins.includes(reward.skin))G.unlockedSkins.push(reward.skin);
  if(reward.cpcBonus)G.cpc+=reward.cpcBonus;
  if(reward.mpsBonus)G.mps+=reward.mpsBonus;
  msgEl.textContent=reward.msg;msgEl.className="code-msg ok";
  inp.value="";
  showNotif("Codigo activado: "+reward.msg);
  checkAch();renderCodes();updateUI();save();
}

function prestigeReq(){return Math.pow(10,5+G.prestiges);}

function doPrestige(){
  if(G.totalCoins<prestigeReq())return;
  if(!confirm("Reiniciar la partida a cambio de un bonus permanente?\n\nConservaras skins, logros y el multiplicador se aplicara siempre."))return;
  G.prestiges++;
  G.prestigeBonus=PRESTIGE_MULT[Math.min(G.prestiges,PRESTIGE_MULT.length-1)];
  const kept={prestiges:G.prestiges,prestigeBonus:G.prestigeBonus,unlockedSkins:G.unlockedSkins,activeSkin:G.activeSkin,achievements:G.achievements,totalCoins:G.totalCoins,totalClicks:G.totalClicks,usedCodes:G.usedCodes,isVip:G.isVip};
  G={...defaultState(),...kept};
  checkAch();renderAll();save();
}

function checkAch(){
  ACHIEVEMENTS.forEach(a=>{
    if(!G.achievements.includes(a.id)&&a.check(G)){
      G.achievements.push(a.id);
      showNotif("Logro desbloqueado: "+a.name);
    }
  });
}

function updateUI(){
  document.getElementById("coin-count").textContent=fmt(G.coins);
  document.getElementById("s-mps").textContent=fmt(G.mps);
  document.getElementById("s-cpc").textContent=fmt(G.cpc*G.prestigeBonus);
  document.getElementById("s-total").textContent=fmt(G.totalCoins);
  document.getElementById("s-pres").textContent=G.prestiges;
  if(G.prestiges>0){
    document.getElementById("prestige-crown").style.display="";
    document.getElementById("crown-val").textContent=G.prestigeBonus;
    document.getElementById("mult-bar").style.display="";
    document.getElementById("mult-val").textContent=G.prestigeBonus+"x";
  }
  if(G.isVip)document.getElementById("vip-badge").className="vip-badge show";
  G.upgrades.forEach((s,i)=>{
    const btn=document.getElementById("ubtn-"+i);
    const qty=document.getElementById("uqty-"+i);
    if(btn)btn.disabled=G.coins<s.price;
    if(qty)qty.textContent=s.qty>0?"x"+s.qty:"";
  });
}

function switchTab(name,btn){
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  btn.classList.add("active");
  if(name==="skins")renderSkins();
  if(name==="prestige")renderPrestige();
  if(name==="ach")renderAch();
  if(name==="codes")renderCodes();
}

function renderShop(){
  const el=document.getElementById("tab-shop");
  let html='<div class="section-hd">Produccion automatica</div>';
  [0,1,2,3,4,5,6].forEach(i=>{
    const u=UPGRADES[i];const s=G.upgrades[i];
    html+=`<div class="shop-item"><div class="item-icon" style="font-family:monospace;font-weight:700;color:var(--accent)">${u.icon}</div><div class="item-info"><div class="item-name">${u.name}<span class="item-qty" id="uqty-${i}">${s.qty>0?"x"+s.qty:""}</span></div><div class="item-desc">${u.desc}${G.prestigeBonus>1?" · x"+G.prestigeBonus+" bonus":""}</div></div><button class="buy-btn" id="ubtn-${i}" onclick="buyUpgrade(${i})" ${G.coins<s.price?"disabled":""}>${fmt(s.price)} c</button></div>`;
  });
  html+='<div class="section-hd">Mejoras de clic</div>';
  [7,8,9,10,11].forEach(i=>{
    const u=UPGRADES[i];const s=G.upgrades[i];
    html+=`<div class="shop-item"><div class="item-icon" style="font-family:monospace;font-weight:700;color:var(--accent2)">${u.icon}</div><div class="item-info"><div class="item-name">${u.name}<span class="item-qty" id="uqty-${i}">${s.qty>0?"x"+s.qty:""}</span></div><div class="item-desc">${u.desc}</div></div><button class="buy-btn" id="ubtn-${i}" onclick="buyUpgrade(${i})" ${G.coins<s.price?"disabled":""}>${fmt(s.price)} c</button></div>`;
  });
  el.innerHTML=html;
}

function renderSkins(){
  const el=document.getElementById("tab-skins");
  let html='<div class="section-hd">Elige tu moneda</div><div class="skin-grid">';
  SKINS.forEach(s=>{
    const unlocked=G.unlockedSkins.includes(s.id);
    const active=G.activeSkin===s.id;
    html+=`<div class="skin-card${active?" active":""}${unlocked?"":" locked"}" onclick="buySkin('${s.id}')"><div class="skin-emoji" style="color:${s.color}">${s.icon}</div><div class="skin-name">${s.name}</div><div class="skin-price">${unlocked?(active?"Equipada":"Equipar"):(fmt(s.cost)+" c")}</div></div>`;
  });
  html+="</div>";el.innerHTML=html;
}

function renderPrestige(){
  const req=prestigeReq();
  const nextMult=PRESTIGE_MULT[Math.min(G.prestiges+1,PRESTIGE_MULT.length-1)];
  let html=`<div class="prestige-card"><h3>Sistema de Prestigio</h3><p>Reinicia tu partida pero conservas skins, logros y obtienes un multiplicador permanente que afecta a toda la produccion.</p><p>Multiplicador actual: <span class="highlight">${G.prestigeBonus}x</span> &nbsp;·&nbsp; Siguiente nivel: <span class="highlight">${nextMult}x</span></p><p style="margin-bottom:10px">Requisito: <span class="highlight">${fmt(req)}</span> monedas ganadas en total &nbsp;(tienes <span class="highlight">${fmt(G.totalCoins)}</span>)</p><button class="prestige-do-btn" ${G.totalCoins<req?"disabled":""} onclick="doPrestige()">Prestigiar Ahora (Prestigio ${G.prestiges+1})</button></div><div class="prestige-card"><h3>Tabla de Multiplicadores</h3><div class="mult-table">`;
  PRESTIGE_MULT.forEach((m,i)=>{html+=`<div class="mult-cell${i===G.prestiges?" current":""}"><div class="lv">Lv ${i}</div><div class="mx">${m}x</div></div>`;});
  html+="</div></div>";
  document.getElementById("tab-prestige").innerHTML=html;
}

function renderAch(){
  const el=document.getElementById("tab-ach");
  const done=G.achievements.length;
  let html=`<div class="section-hd">${done} / ${ACHIEVEMENTS.length} desbloqueados</div>`;
  ACHIEVEMENTS.forEach(a=>{
    const unlocked=G.achievements.includes(a.id);
    html+=`<div class="ach-item${unlocked?"":" locked"}"><div class="ach-icon">[${a.icon}]</div><div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>${unlocked?'<div class="ach-check">OK</div>':""}</div>`;
  });
  el.innerHTML=html;
}

function renderCodes(){
  const el=document.getElementById("tab-codes");
  const total=Object.keys(SECRET_CODES).length;
  const used=G.usedCodes.length;
  let html=`<div class="section-hd">Codigos de recompensa</div>
  <div class="code-area">
    <p>Introduce un codigo secreto para obtener recompensas exclusivas. Los codigos los puedes encontrar en redes, eventos especiales o... explorando.</p>
    <div class="code-row">
      <input class="code-input" id="code-input" type="text" placeholder="INTRODUCIR CODIGO" maxlength="20" onkeydown="if(event.key==='Enter')redeemCode()">
      <button class="code-submit" onclick="redeemCode()">Canjear</button>
    </div>
    <div class="code-msg" id="code-msg"></div>
  </div>
  <div class="section-hd">${used} de ${total} codigos encontrados</div>
  <div class="used-codes">`;
  if(G.usedCodes.length===0){html+='<span style="font-size:11px;color:var(--muted)">Aun no has usado ningun codigo.</span>';}
  else{G.usedCodes.forEach(c=>{html+=`<span class="used-code-tag">${c}</span>`;});}
  html+="</div>";
  if(G.isVip){html+='<div class="section-hd">Estado VIP</div><div style="background:linear-gradient(90deg,rgba(255,149,0,0.15),rgba(255,200,0,0.1));border:1px solid var(--accent2);border-radius:9px;padding:10px 12px;font-size:11px;color:var(--accent2);font-weight:600">Eres miembro VIP de Minguelasgo Games. Gracias por tu apoyo.</div>';}
  el.innerHTML=html;
}

function renderAll(){
  renderShop();renderSkins();renderPrestige();renderAch();renderCodes();
  const skin=SKINS.find(s=>s.id===G.activeSkin);
  if(skin){
    const ic=document.getElementById("coin-icon");
    if(ic){ic.innerHTML=skin.icon;ic.style.color=skin.color;}
  }
  updateUI();
}

function resetGame(){
  if(!confirm("Seguro? Perderás todo el progreso, incluyendo prestigios, skins y codigos."))return;
  localStorage.removeItem("clicker_mg_v4");
  G=defaultState();renderAll();
}

setInterval(()=>{
  if(G.mps>0){const gain=G.mps/10;G.coins+=gain;G.totalCoins+=gain;checkAch();updateUI();}
},100);

setInterval(()=>{save();},8000);

renderAll();
</script>
