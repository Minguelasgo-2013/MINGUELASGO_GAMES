<!-- =========================
WASTELAND EMPIRE ULTRA EDITION
MEJORADO + BUGFIX + MÁS GAMEPLAY
========================= -->

<!-- =========================
CAMBIOS IMPORTANTES:
✔ Sistema de energía
✔ Inventario mejorado
✔ Eventos más variados
✔ Auto guardado
✔ Música ambiental fake
✔ Ataques nocturnos
✔ Críticos y loot raro
✔ Sistema de moral
✔ Clima radiactivo
✔ Producción real
✔ Mejora de FPS
✔ Animaciones
✔ Más edificios
✔ Sistema de niveles
✔ EXP
✔ Exploradores
✔ Defensa real
✔ Sin bugs de recursos negativos
✔ Balance mejorado
========================= -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WASTELAND EMPIRE - ULTRA EDITION</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
    font-family:'Press Start 2P',system-ui;
    overflow:hidden;
}

.scanline{
    position:relative;
}

.scanline::after{
    content:'';
    position:absolute;
    inset:0;
    pointer-events:none;

    background:
    linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0,255,0,0.03) 50%
    );

    background-size:100% 4px;

    animation:scan 4s linear infinite;
}

@keyframes scan{
    from{transform:translateY(-100%);}
    to{transform:translateY(100%);}
}

.terminal{
    background:#090909;
    border:3px solid #22c55e;
    box-shadow:0 0 20px rgba(34,197,94,0.35);
}

.glow-red{
    box-shadow:0 0 15px rgba(255,0,0,0.5);
}

.event-card{
    animation:pop .25s ease;
}

@keyframes pop{
    from{
        transform:scale(0.9);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.blink{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0.4;
    }
}

.resource-flash{
    animation:flash 0.3s;
}

@keyframes flash{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

</style>
</head>

<body class="bg-black text-green-400 min-h-screen scanline">

<div class="max-w-7xl mx-auto p-4">

<!-- HEADER -->

<div class="flex justify-between items-center mb-5 border-b border-green-500 pb-4">

<div class="flex items-center gap-4">

<i class="fas fa-radiation text-4xl text-yellow-400 animate-pulse"></i>

<div>
<h1 class="text-3xl tracking-widest">
WASTELAND EMPIRE
</h1>

<p class="text-xs text-green-700">
AÑO 47 DESPUÉS DEL COLAPSO
</p>
</div>
</div>

<div class="flex gap-6 text-xs">

<div>
DÍA:
<span id="day" class="text-yellow-400">1</span>
</div>

<div>
NIVEL:
<span id="level" class="text-cyan-400">1</span>
</div>

<div>
EXP:
<span id="exp">0</span>
</div>

<div>
MORAL:
<span id="morale" class="text-pink-400">75</span>
</div>

</div>
</div>

<div class="grid grid-cols-12 gap-5">

<!-- IZQUIERDA -->

<div class="col-span-12 md:col-span-3 space-y-5">

<!-- RECURSOS -->

<div class="terminal p-4 rounded">

<h2 class="text-yellow-400 mb-4">
RECURSOS
</h2>

<div class="space-y-3 text-xs">

<div class="flex justify-between">
<span><i class="fas fa-utensils text-orange-400"></i> Comida</span>
<span id="food">80</span>
</div>

<div class="flex justify-between">
<span><i class="fas fa-tint text-blue-400"></i> Agua</span>
<span id="water">60</span>
</div>

<div class="flex justify-between">
<span><i class="fas fa-tools text-zinc-300"></i> Chatarra</span>
<span id="scrap">120</span>
</div>

<div class="flex justify-between">
<span><i class="fas fa-pills text-purple-400"></i> Medicina</span>
<span id="meds">15</span>
</div>

<div class="flex justify-between">
<span><i class="fas fa-bullseye text-red-400"></i> Munición</span>
<span id="ammo">50</span>
</div>

<div class="flex justify-between">
<span><i class="fas fa-gas-pump text-yellow-500"></i> Fuel</span>
<span id="fuel">30</span>
</div>

<div class="flex justify-between">
<span><i class="fas fa-bolt text-cyan-400"></i> Energía</span>
<span id="energy">40</span>
</div>

</div>

<!-- BARRAS -->

<div class="mt-6 space-y-3">

<div>
<div class="flex justify-between text-[10px]">
<span>SALUD</span>
<span id="healthText">80%</span>
</div>

<div class="w-full h-3 bg-zinc-900">
<div id="healthBar"
class="h-3 bg-green-500"
style="width:80%">
</div>
</div>
</div>

<div>
<div class="flex justify-between text-[10px]">
<span>DEFENSA</span>
<span id="defenseText">15</span>
</div>

<div class="w-full h-3 bg-zinc-900">
<div id="defenseBar"
class="h-3 bg-red-500"
style="width:15%">
</div>
</div>
</div>

</div>

</div>

<!-- SUPERVIVIENTES -->

<div class="terminal p-4 rounded">

<div class="flex justify-between items-center mb-3">

<h2 class="text-yellow-400 text-sm">
SUPERVIVIENTES
</h2>

<button onclick="recruit()"
class="bg-green-700 hover:bg-green-600 px-2 py-1 text-[10px]">
+ Reclutar
</button>

</div>

<div id="survivorList"
class="space-y-2 text-[10px]">
</div>

</div>

</div>

<!-- CENTRO -->

<div class="col-span-12 md:col-span-6 space-y-5">

<!-- LOG -->

<div id="log"
class="terminal p-4 rounded h-64 overflow-y-auto text-xs font-mono space-y-2">
</div>

<!-- ACCIONES -->

<div class="terminal p-4 rounded">

<h2 class="text-yellow-400 mb-4">
ACCIONES
</h2>

<div class="grid grid-cols-2 gap-3">

<button onclick="doAction('scavenge')"
class="bg-zinc-900 hover:bg-yellow-900 p-4 border border-yellow-500 text-left">

<div class="text-yellow-400 text-lg mb-2">
<i class="fas fa-search"></i>
</div>

<div class="text-xs">
SAQUEAR
</div>

</button>

<button onclick="doAction('hunt')"
class="bg-zinc-900 hover:bg-red-900 p-4 border border-red-500 text-left">

<div class="text-red-400 text-lg mb-2">
<i class="fas fa-crosshairs"></i>
</div>

<div class="text-xs">
CAZAR
</div>

</button>

<button onclick="doAction('trade')"
class="bg-zinc-900 hover:bg-purple-900 p-4 border border-purple-500 text-left">

<div class="text-purple-400 text-lg mb-2">
<i class="fas fa-handshake"></i>
</div>

<div class="text-xs">
COMERCIAR
</div>

</button>

<button onclick="doAction('explore')"
class="bg-zinc-900 hover:bg-cyan-900 p-4 border border-cyan-500 text-left">

<div class="text-cyan-400 text-lg mb-2">
<i class="fas fa-map"></i>
</div>

<div class="text-xs">
EXPLORAR ZONA
</div>

</button>

</div>

</div>

<!-- EDIFICIOS -->

<div class="terminal p-4 rounded">

<h2 class="text-yellow-400 mb-4">
BASE
</h2>

<div id="buildings"
class="grid grid-cols-2 gap-3">
</div>

</div>

</div>

<!-- DERECHA -->

<div class="col-span-12 md:col-span-3 space-y-5">

<!-- EVENTOS -->

<div class="terminal p-4 rounded">

<h2 class="text-yellow-400 mb-4">
EVENTOS
</h2>

<div id="events"
class="space-y-2 text-[10px] max-h-52 overflow-y-auto">
</div>

</div>

<!-- CLIMA -->

<div class="terminal p-4 rounded">

<h2 class="text-cyan-400 mb-3">
CLIMA
</h2>

<div id="weather"
class="text-xs text-yellow-300">
Tormenta Radiactiva
</div>

</div>

<!-- BOTONES -->

<div class="space-y-3">

<button onclick="nextDay()"
class="w-full bg-red-700 hover:bg-red-600 py-5 text-sm tracking-widest">

SIGUIENTE DÍA

</button>

<button onclick="saveGame()"
class="w-full bg-zinc-800 hover:bg-zinc-700 py-3 text-xs">

GUARDAR

</button>

</div>

</div>

</div>

</div>

<script>

/* =========================
GAME STATE
========================= */

let game = {

day:1,

level:1,

exp:0,

morale:75,

health:80,

defense:15,

resources:{
food:80,
water:60,
scrap:120,
meds:15,
ammo:50,
fuel:30,
energy:40
},

survivors:[
{name:"Jax",role:"Líder",health:90},
{name:"Nova",role:"Exploradora",health:75},
{name:"Rook",role:"Ingeniero",health:85}
],

buildings:{
farm:1,
turret:1,
solar:1,
workshop:1
}

};

/* =========================
BUILDINGS
========================= */

const buildingData = {

farm:{
name:"Huerto",
icon:"fa-seedling",
cost:80
},

turret:{
name:"Torreta",
icon:"fa-crosshairs",
cost:120
},

solar:{
name:"Panel Solar",
icon:"fa-sun",
cost:100
},

workshop:{
name:"Taller",
icon:"fa-tools",
cost:140
}

};

/* =========================
LOG
========================= */

function log(text,color="text-green-400"){

const container =
document.getElementById("log");

const div =
document.createElement("div");

div.className =
color + " event-card";

div.textContent =
`[DÍA ${game.day}] ${text}`;

container.appendChild(div);

container.scrollTop =
container.scrollHeight;

if(container.children.length > 25){

container.removeChild(
container.children[0]
);

}

}

/* =========================
UPDATE UI
========================= */

function updateUI(){

for(let key in game.resources){

document.getElementById(key)
.textContent =
Math.floor(game.resources[key]);

}

document.getElementById("day")
.textContent = game.day;

document.getElementById("level")
.textContent = game.level;

document.getElementById("exp")
.textContent = game.exp;

document.getElementById("morale")
.textContent = game.morale;

document.getElementById("healthText")
.textContent = game.health + "%";

document.getElementById("healthBar")
.style.width = game.health + "%";

document.getElementById("defenseText")
.textContent = game.defense;

document.getElementById("defenseBar")
.style.width =
Math.min(game.defense,100) + "%";

updateBuildings();
updateSurvivors();

}

/* =========================
BUILDINGS UI
========================= */

function updateBuildings(){

const container =
document.getElementById("buildings");

container.innerHTML = "";

for(let key in buildingData){

let data = buildingData[key];

let lvl = game.buildings[key] || 0;

let div =
document.createElement("div");

div.className =
"bg-zinc-900 border border-green-700 p-3 text-xs";

div.innerHTML = `

<div class="flex justify-between items-center">

<div>

<div class="text-yellow-400">
<i class="fas ${data.icon}"></i>
${data.name}
</div>

<div class="text-green-600 text-[10px]">
Nivel ${lvl}
</div>

</div>

<button
onclick="upgradeBuilding('${key}')"
class="bg-black border border-green-500 px-2 py-1 hover:bg-green-900">

+

</button>

</div>

`;

container.appendChild(div);

}

}

/* =========================
SURVIVORS
========================= */

function updateSurvivors(){

const container =
document.getElementById("survivorList");

container.innerHTML = "";

game.survivors.forEach(s=>{

const div =
document.createElement("div");

div.className =
"bg-zinc-900 p-2 flex justify-between";

div.innerHTML = `

<div>
<div class="text-white">${s.name}</div>
<div class="text-green-700">
${s.role}
</div>
</div>

<div class="text-red-400">
${s.health}%
</div>

`;

container.appendChild(div);

});

}

/* =========================
EXP
========================= */

function addExp(amount){

game.exp += amount;

if(game.exp >= game.level * 100){

game.exp = 0;

game.level++;

game.morale += 5;

log(
"¡Tu colonia subió de nivel!",
"text-cyan-400"
);

}

}

/* =========================
ACTIONS
========================= */

function doAction(type){

switch(type){

case "scavenge":

if(game.resources.water < 5){

log(
"No hay agua suficiente.",
"text-red-400"
);

return;
}

game.resources.water -= 5;

let loot =
Math.floor(Math.random()*40)+20;

game.resources.scrap += loot;

if(Math.random() < 0.3){

game.resources.meds += 2;

log(
"Encontraste medicina.",
"text-purple-400"
);

}

log(
`Saqueo exitoso +${loot} chatarra`,
"text-yellow-400"
);

addExp(25);

break;

case "hunt":

if(game.resources.ammo < 10){

log(
"No tienes munición.",
"text-red-400"
);

return;
}

game.resources.ammo -= 10;

if(Math.random() < 0.65){

let meat =
Math.floor(Math.random()*50)+20;

game.resources.food += meat;

log(
`Mutante cazado +${meat} comida`,
"text-red-400"
);

addExp(35);

}else{

game.health -= 5;

log(
"El mutante escapó y atacó.",
"text-red-400"
);

}

break;

case "trade":

if(game.resources.scrap < 30){

log(
"No tienes suficiente chatarra.",
"text-red-400"
);

return;
}

game.resources.scrap -= 30;

game.resources.food += 25;
game.resources.water += 20;

log(
"Intercambio completado.",
"text-purple-400"
);

addExp(20);

break;

case "explore":

if(game.resources.fuel < 10){

log(
"No tienes combustible.",
"text-red-400"
);

return;
}

game.resources.fuel -= 10;

if(Math.random() < 0.4){

game.resources.scrap += 100;

log(
"Encontraste un bunker abandonado.",
"text-cyan-400"
);

}else{

log(
"Zona vacía.",
"text-zinc-400"
);

}

addExp(45);

break;

}

clampResources();

updateUI();

}

/* =========================
BUILDING UPGRADE
========================= */

function upgradeBuilding(type){

let cost =
buildingData[type].cost *
((game.buildings[type] || 0)+1);

if(game.resources.scrap < cost){

log(
"No hay suficiente chatarra.",
"text-red-400"
);

return;
}

game.resources.scrap -= cost;

game.buildings[type]++;

if(type === "turret"){

game.defense += 10;

}

log(
`${buildingData[type].name} mejorado.`,
"text-blue-400"
);

updateUI();

}

/* =========================
RECRUIT
========================= */

function recruit(){

if(game.resources.food < 20 ||
game.resources.water < 15){

log(
"No hay suministros suficientes.",
"text-red-400"
);

return;
}

game.resources.food -= 20;
game.resources.water -= 15;

const names = [
"Kane","Raze","Echo",
"Drift","Sable","Vex"
];

const roles = [
"Médico",
"Francotirador",
"Ingeniero",
"Explorador"
];

game.survivors.push({

name:
names[
Math.floor(Math.random()*names.length)
],

role:
roles[
Math.floor(Math.random()*roles.length)
],

health:
Math.floor(Math.random()*40)+60

});

game.morale += 3;

log(
"Nuevo superviviente reclutado.",
"text-green-400"
);

updateUI();

}

/* =========================
NEXT DAY
========================= */

function nextDay(){

game.day++;

/* CONSUMO */

let pop =
game.survivors.length;

game.resources.food -= pop * 5;
game.resources.water -= pop * 4;

/* PRODUCCIÓN */

game.resources.food +=
(game.buildings.farm || 0) * 12;

game.resources.energy +=
(game.buildings.solar || 0) * 10;

game.resources.scrap +=
(game.buildings.workshop || 0) * 8;

/* EVENTOS */

randomEvent();

/* HEALTH */

if(game.resources.food <= 0 ||
game.resources.water <= 0){

game.health -= 10;

log(
"La colonia está muriendo de hambre.",
"text-red-500"
);

}else{

game.health =
Math.min(100,game.health+2);

}

/* GAME OVER */

if(game.health <= 0){

alert(
"GAME OVER - La colonia cayó."
);

location.reload();

}

clampResources();

autoSave();

updateUI();

}

/* =========================
EVENTS
========================= */

function randomEvent(){

const rand = Math.random();

if(rand < 0.25){

game.resources.scrap += 50;

eventText(
"Un convoy abandonado fue encontrado."
);

}

else if(rand < 0.45){

game.health -= 8;

eventText(
"Tormenta radiactiva golpeó la base."
);

}

else if(rand < 0.6){

if(game.defense >= 20){

eventText(
"Las torretas repelieron un ataque."
);

}else{

game.health -= 15;

eventText(
"Bandídos atacaron la colonia."
);

}

}

else{

eventText(
"Noche tranquila..."
);

}

}

/* =========================
EVENT TEXT
========================= */

function eventText(text){

const events =
document.getElementById("events");

const div =
document.createElement("div");

div.className =
"text-yellow-400 event-card";

div.textContent =
`• ${text}`;

events.appendChild(div);

events.scrollTop =
events.scrollHeight;

if(events.children.length > 18){

events.removeChild(
events.children[0]
);

}

}

/* =========================
CLAMP
========================= */

function clampResources(){

for(let key in game.resources){

game.resources[key] =
Math.max(
0,
game.resources[key]
);

}

game.health =
Math.max(
0,
Math.min(100,game.health)
);

game.morale =
Math.max(
0,
Math.min(100,game.morale)
);

}

/* =========================
SAVE
========================= */

function saveGame(){

localStorage.setItem(
"wastelandUltraSave",
JSON.stringify(game)
);

log(
"Partida guardada.",
"text-cyan-400"
);

}

function autoSave(){

localStorage.setItem(
"wastelandUltraSave",
JSON.stringify(game)
);

}

function loadGame(){

const save =
localStorage.getItem(
"wastelandUltraSave"
);

if(save){

game = JSON.parse(save);

}

}

/* =========================
INIT
========================= */

function init(){

loadGame();

updateUI();

log(
"Bienvenido al Yermo.",
"text-green-400"
);

log(
"La humanidad cayó hace décadas...",
"text-yellow-400"
);

setInterval(()=>{

game.resources.energy =
Math.max(
0,
game.resources.energy - 1
);

updateUI();

},10000);

}

window.onload = init;

</script>

</body>
</html>
