<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MINGUELASGO GAMES</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #00ffcc; 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }

        /* BANNER VIP ESTILO DAVO */
        .vip-banner {
            max-width: 650px;
            margin: 20px auto 40px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid #ffd700;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .vip-banner input {
            background: #000;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            outline: none;
        }

        .vip-banner button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* CONTENEDOR DE JUEGOS */
        .container { 
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-card { 
            width: 280px; 
            padding: 20px; 
            margin: 15px;
            background: #1a1a1a; 
            border: 2px solid #00ffcc; 
            border-radius: 15px;
        }

        .game-img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #333; }
        
        h1 { font-size: 3em; text-shadow: 0 0 15px #00ffcc; }
        
        .play-btn { background: #00ffcc; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎮 MINGUELASGO JUEGOS</h1>

    <!-- SECCIÓN VIP -->
    <div class="vip-banner" id="vipSection">
        <div id="vip-locked" style="display: flex; align-items: center; gap: 15px;">
            <span style="color: #ffd700; font-weight: bold;">⭐ ACCESO VIP:</span>
            <input type="password" id="vipPass" placeholder="codigo">
            <button onclick="checkVip()">ENTRAR</button>
        </div>
        
        <div id="vip-unlocked" style="display: none; width: 100%; text-align: center;">
            <span style="color: #ffd700; font-weight: bold; margin-right: 20px;">✅ ACCESO CONCEDIDO</span>
            <button onclick="location.href='vip-extension.html'" style="background: #fff; color: #000; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold;">ABRIR EXTENSIÓN VIP</button>
        </div>
    </div>

    <div class="container">
        <!-- JUEGO 1 -->
        <div class="game-card">
            <img src="https://unsplash.com" class="game-img" alt="Block Dash">
            <h3>BLOCK DASH</h3>
            <button class="play-btn" onclick="location.href='BlockDash/index.html'">JUGAR AHORA</button>
        </div>

        <!-- JUEGO 2 -->
        <div class="game-card" style="opacity: 0.5;">
            <img src="https://unsplash.com" class="game-img" alt="Próximamente">
            <h3>PRÓXIMAMENTE</h3>
            <button class="play-btn" disabled>SOON</button>
        </div>
    </div>

    <script>
        async function checkVip() {
            // Convertimos a minúsculas y quitamos espacios para que siempre funcione
            const pass = document.getElementById('vipPass').value.toLowerCase().trim();
            
            if (!pass) return;

            const encoder = new TextEncoder();
            const data = encoder.encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Hash para la contraseña: miguelrico
            const secret = "f45610e2009aa502844898857e4e1a141a0293d6291a134706504a5848c90f23";

            if (hashHex === secret) {
                document.getElementById('vip-locked').style.display = 'none';
                document.getElementById('vip-unlocked').style.display = 'block';
                document.getElementById('vipSection').style.background = "rgba(0, 255, 204, 0.1)";
            } else {
                alert("Código incorrecto. Preguntale a Migui");
            }
        }
    </script>
</body>
</html>
