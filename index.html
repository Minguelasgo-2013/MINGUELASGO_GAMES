<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINGUELASGO JUEGOS</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f0f0f;
            color:#00ffcc;
            font-family:Arial, sans-serif;
            text-align:center;
            padding:20px;
            overflow-x:hidden;
        }

        h1{
            font-size:3.5em;
            text-shadow:
            0 0 15px #00ffcc,
            0 0 30px #00ffcc;
            margin-top:40px;
            letter-spacing:2px;
        }

        .container{
            max-width:1200px;
            margin:50px auto;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:30px;
        }

        .game-card{
            width:300px;
            padding:20px;
            background:#1a1a1a;
            border:2px solid #00ffcc;
            border-radius:20px;
            transition:0.3s;
            box-shadow: 0 0 15px rgba(0,255,204,0.2);
        }

        .game-card:hover{
            transform:scale(1.05);
            box-shadow:0 0 35px #00ffcc;
            border-color:#fff;
        }

        .game-img{
            width:100%;
            height:160px;
            object-fit:cover;
            border-radius:12px;
            margin-bottom:15px;
            border:1px solid #333;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h3{
            color:#fff;
            margin:10px 0;
            font-size:1.4em;
        }

        p{
            color:#888;
            font-size:0.9em;
            margin-bottom:20px;
        }

        .play-btn{
            background:#00ffcc;
            color:#000;
            border:none;
            padding:14px;
            width:100%;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            font-size:1em;
            transition:0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .play-btn:hover{
            background:#fff;
            transform:translateY(-2px);
        }

        footer{
            margin-top:50px;
            color:#444;
            font-size:0.8em;
        }

        #vipBox{
            position:fixed;
            right:20px;
            bottom:20px;
            width:260px;
            background:rgba(0,0,0,0.96);
            border:2px solid #00ffcc;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 20px #00ffcc55;
            text-align:center;
            z-index:999;
        }

        #vipBox h2{
            color:#00ffcc;
            margin-bottom:10px;
            text-shadow:0 0 10px #00ffcc;
        }

        #vipInput{
            width:100%;
            padding:12px;
            background:#000;
            border:2px solid #00ffcc;
            border-radius:8px;
            color:#00ffcc;
            text-align:center;
            margin-bottom:12px;
            outline:none;
        }

        #vipBtn{
            width:100%;
            padding:12px;
            background:transparent;
            color:#00ffcc;
            border:2px solid #00ffcc;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }
        
        #vipBtn:hover {
            background: #00ffcc;
            color: #000;
        }
    </style>
</head>
<body>

    <h1>MINGUELASGO JUEGOS</h1>

    <div class="container">
        <div class="game-card">
            <div class="game-img">
                <span style="font-size: 50px;">⚡</span>
            </div>
            <h3>NEON RUNNER VIP</h3>
            <p>Esquiva los bloques rojos a toda velocidad en este desafío de neón.</p>
            <a href="juegos/neon-runner.html" class="play-btn">JUGAR AHORA</a>
        </div>
    </div>

    <div id="vipBox">
        <h2>ACCESO VIP</h2>
        <p>Introduce tu código</p>
        <input type="password" id="vipInput" placeholder="CÓDIGO">
        <button id="vipBtn">ENTRAR</button>
    </div>

    <footer>
        &copy; 2024 MINGUELASGO JUEGOS - Todos los derechos reservados
    </footer>

    <!-- SCRIPT DE CONEXIÓN -->
    <script>
        document.getElementById('vipBtn').addEventListener('click', function() {
            const pass = document.getElementById('vipInput').value;
            
            // CAMBIA "VIP2024" POR LA CONTRASEÑA QUE QUIERAS
            if (pass === "VIP2024") {
                window.location.href = "vip.html";
            } else {
                alert("Código VIP incorrecto");
                document.getElementById('vipInput').value = "";
            }
        });

        // También permite entrar pulsando la tecla "Enter"
        document.getElementById('vipInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('vipBtn').click();
            }
        });
    </script>

</body>
</html>
