<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MINGUELASGO - ZONA VIP</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; text-align: center; padding: 50px; }
        
        .vip-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            background: #111;
            border: 2px solid #ffd700; /* Dorado VIP */
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .vip-img {
            width: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #ffd700);
        }

        h2 { color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        input {
            width: 90%;
            padding: 12px;
            margin: 20px 0;
            background: #000;
            border: 1px solid #ffd700;
            border-radius: 8px;
            color: #ffd700;
            text-align: center;
            font-size: 18px;
        }

        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffd700;
        }

        /* Estilo para el contenido oculto */
        #secret-content { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        .ext-link { color: #00ffcc; text-decoration: none; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="vip-container">
        <img src="https://flaticon.com" class="vip-img">
        <h2>ACCESO VIP</h2>
        <p>Introduce tu código de acceso especial</p>

        <div id="login-area">
            <input type="password" id="passInput" placeholder="••••••••">
            <button onclick="verificarCodigo()">DESBLOQUEAR</button>
        </div>

        <!-- Esta es la "extensión" que aparece al acertar -->
        <div id="secret-content">
            <h3 style="color: #00ffcc;">¡ACCESO CONCEDIDO!</h3>
            <p>Bienvenido a la extensión VIP de MINGUELASGO.</p>
            <a href="https://tu-enlace-aqui.com" class="ext-link">➡️ ENTRAR A LA EXTENSIÓN</a>
            <button onclick="location.reload()" style="margin-top:20px; background:#333; color:#fff;">CERRAR SESIÓN</button>
        </div>
    </div>

    <script>
        async function verificarCodigo() {
            const pass = document.getElementById('passInput').value;
            
            // Generamos el Hash SHA-256 para que no se vea el código en Sources
            const encoder = new TextEncoder();
            const data = encoder.encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Hash del código "M1gu5l r1c0"
            const hashCorrecto = "05367690623a9d35f492215c328905330e2652a9d8217343e8003185368a3350";

            if (hashHex === hashCorrecto) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('secret-content').style.display = 'block';
                document.querySelector('.vip-container').style.borderColor = "#00ffcc";
            } else {
                alert("Código incorrecto.preguntale a Migui.");
            }
        }
    </script>
</body>
</html>
