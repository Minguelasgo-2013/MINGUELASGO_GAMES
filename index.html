<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MINGUELASGO JUEGOS</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #00ffcc; 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }

        h1 { 
            font-size: 3.5em; 
            text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc; 
            margin-top: 40px;
            letter-spacing: 2px;
        }

        /* CONTENEDOR DE JUEGOS */
        .container { 
            max-width: 1200px;
            margin: 50px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .game-card { 
            width: 300px; 
            padding: 20px; 
            background: #1a1a1a; 
            border: 2px solid #00ffcc; 
            border-radius: 20px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px #00ffcc;
            border-color: #fff;
        }

        /* Imágenes de respaldo por si las tuyas no cargan */
        .game-img { 
            width: 100%; 
            height: 160px; 
            object-fit: cover; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            background: #333;
            border: 1px solid #333;
        }
        
        h3 { color: #fff; margin: 10px 0; font-size: 1.4em; }
        p { color: #888; font-size: 0.9em; margin-bottom: 20px; }
        
        .play-btn { 
            background: #00ffcc; 
            color: #000; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1em;
            transition: 0.2s;
        }

        .play-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>🎮 MINGUELASGO JUEGOS</h1>

    <div class="container">
        
        <!-- JUEGO 1: BLOCK DASH -->
        <div class="game-card">
            <img src="https://unsplash.com" class="game-img" alt="Block Dash">
            <h3>BLOCK DASH</h3>
            <p>Esquiva los bloques rojos.<br>¡Récord de velocidad!</p>
            <button class="play-btn" onclick="location.href='BlockDash/index.html'">JUGAR AHORA</button>
        </div>

        <!-- JUEGO 2: CAZA EL PUNTO -->
        <div class="game-card">
            <img src="https://unsplash.com" class="game-img" alt="Caza Puntos">
            <h3>🎯 CAZA EL PUNTO</h3>
            <p>Pon a prueba tus reflejos.<br>¡Clica antes del tiempo!</p>
            <button class="play-btn" onclick="location.href='CazaPuntos/index.html'">JUGAR AHORA</button>
        </div>

        <!-- PRÓXIMAMENTE -->
        <div class="game-card" style="opacity: 0.4; cursor: not-allowed;">
            <img src="https://unsplash.com" class="game-img" alt="Coming Soon">
            <h3>PRÓXIMAMENTE</h3>
            <p>Estamos cocinando<br>algo nuevo...</p>
            <button class="play-btn" disabled>BLOQUEADO</button>
        </div>

    </div>

    <footer style="margin-top: 50px; color: #444; font-size: 0.8em;">
        &copy; 2024 MINGUELASGO GAMES
    </footer>

</body>
</html>
