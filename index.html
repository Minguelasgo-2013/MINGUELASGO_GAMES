<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MINGUELASGO GAMES
    </title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #00ffcc; 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .container { 
            margin-top: 50px; 
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-card { 
            display: inline-block; 
            width: 280px; 
            padding: 20px; 
            margin: 20px;
            background: #1a1a1a; 
            border: 2px solid #00ffcc; 
            border-radius: 15px;
            transition: 0.3s; 
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,255,204,0.3);
        }
        /* Estilo para las imágenes de los juegos */
        .game-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #333; /* Color de carga */
        }

        .game-card:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 30px #00ffcc; 
            border-color: #ffffff;
        }
        button { 
            background: #00ffcc; 
            color: black; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #00ccaa;
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ffcc;
        }
        h1 {
            font-size: 3em;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            margin-bottom: 20px;
            animation: blink 1.5s infinite alternate;
        }
        h3 {
            margin: 0 0 10px 0;
            color: #ffffff;
        }
        p {
            margin: 0 0 15px 0;
            color: #888;
            font-size: 14px;
        }
        @keyframes blink {
            from { opacity: 1; text-shadow: 0 0 10px #00ffcc; }
            to { opacity: 0.8; text-shadow: 0 0 20px #00ffcc; }
        }
    </style>
</head>
<body>

    <h1>🎮 MINGUELASGO JUEGOS </h1>

    <div class="container" id="gameContainer">
        
        <!-- JUEGO 1: BLOCK DASH -->
        <div class="game-card" onclick="playGame('BlockDash/index.html')">
            <!-- Imagen temática: Un cuadrado neón saltando bloques -->
            <img src="https://itch.zone" alt="Block Dash" class="game-img">
            <h3>🏃‍♂️ BLOCK DASH</h3>
            <p>Esquiva los bloques rojos<br>¡No te pillen!</p>
            <button>🚀 JUGAR AHORA</button>
        </div>

        <!-- JUEGO 2: CONEXIÓN DE TU OTRO JUEGO -->
        <div class="game-card" onclick="playGame('NombreDeTuCarpeta/index.html')">
            <!-- Imagen temática: Un mando de juego retro o target -->
            <img src="https://freepik.com" alt="Tu Juego" class="game-img">
            <h3>🎯 TU OTRO JUEGO</h3>
            <p>Descripción de tu segundo juego.<br>¡Pruébalo ya!</p>
            <button>🎮 JUGAR AHORA</button>
        </div>

        <!-- JUEGO 3: PRÓXIMAMENTE -->
        <div class="game-card" style="opacity: 0.6; cursor: default;">
            <img src="https://placeholder.com" alt="Próximamente" class="game-img">
            <h3>⭐ Juego 3</h3>
            <p>Nuevos niveles en camino...<br>Mantente atento.</p>
            <button disabled style="background: #444; color: #888;">SOON</button>
        </div>

    </div>

    <script>
        function playGame(gamePath) {
            window.location.href = gamePath;
        }
    </script>

</body>
</html>
