<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 EL HEIST VIP - The Grand Heist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --gold: #e94560;
            --success: #00d4aa;
            --warning: #ffa500;
            --danger: #ff4757;
            --text: #ecf0f1;
        }
        body {
            font-family: 'Orbitron', 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* MENÚ PRINCIPAL */
        .main-menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
        }
        .title-game {
            font-size: 4em;
            color: var(--gold);
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--gold);
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px var(--gold); }
            50% { text-shadow: 0 0 40px var(--gold); }
        }
        .subtitle {
            font-size: 1.2em;
            color: var(--success);
            margin-bottom: 50px;
            letter-spacing: 3px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: 2px solid var(--gold);
            background: var(--accent);
            color: var(--text);
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:hover {
            background: var(--gold);
            color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--gold);
        }

        /* JUEGO */
        .game-container {
            display: none;
            flex-direction: column;
            height: 100vh;
        }
        .game-container.active {
            display: flex;
        }
        .header {
            background: var(--secondary);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
        }
        .game-stats {
            display: flex;
            gap: 40px;
            align-items: center;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-label {
            color: var(--success);
            font-size: 0.9em;
        }
        .stat-value {
            font-size: 1.3em;
            color: var(--gold);
            font-weight: bold;
        }
        .turn-indicator {
            padding: 10px 20px;
            background: var(--danger);
            border-radius: 5px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar, .right-sidebar {
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar {
            width: 300px;
            background: var(--accent);
            border-right: 2px solid var(--gold);
        }
        .right-sidebar {
            width: 280px;
            background: var(--accent);
            border-left: 2px solid var(--gold);
        }

        .section-title {
            color: var(--gold);
            font-size: 1.2em;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }

        .team-member {
            background: var(--primary);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid var(--gold);
            cursor: pointer;
            transition: all 0.3s;
        }
        .team-member:hover {
            background: var(--secondary);
            transform: translateX(5px);
        }
        .team-member.selected {
            background: var(--gold);
            color: var(--primary);
        }

        .tabs {
            display: flex;
            background: var(--secondary);
            border-bottom: 2px solid var(--gold);
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .tab.active {
            background: var(--gold);
            color: var(--primary);
        }

        .tab-content {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .map-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .map-level {
            background: var(--secondary);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--accent);
            cursor: pointer;
            transition: all 0.3s;
        }
        .map-level:hover {
            border-color: var(--gold);
            transform: scale(1.05);
        }
        .map-level.cleared {
            border-color: var(--success);
            background: rgba(0, 212, 170, 0.1);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .action-card {
            background: var(--secondary);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid var(--accent);
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-card:hover {
            background: var(--accent);
            border-color: var(--gold);
        }

        .log-entry {
            background: var(--primary);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 0.85em;
            border-left: 3px solid var(--gold);
        }
        .log-entry.success { border-left-color: var(--success); }
        .log-entry.danger { border-left-color: var(--danger); color: var(--danger); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--secondary);
            padding: 30px;
            border-radius: 10px;
            border: 3px solid var(--gold);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- MENÚ PRINCIPAL -->
    <div class="main-menu" id="mainMenu">
        <h1 class="title-game">🎭 EL HEIST VIP</h1>
        <p class="subtitle">THE GRAND LUNAR CASINO HEIST</p>
        <div class="menu-buttons">
            <button class="btn" onclick="startGame()">INICIAR ATRACO</button>
            <button class="btn" onclick="showInstructions()">INSTRUCCIONES</button>
        </div>
    </div>

    <!-- JUEGO -->
    <div class="game-container" id="gameContainer">
        <div class="header">
            <div class="game-title">🎭 EL HEIST VIP</div>
            <div class="game-stats">
                <div class="stat">
                    <span class="stat-label">TURNO</span>
                    <span class="stat-value" id="turnDisplay">1/12</span>
                </div>
                <div class="stat">
                    <span class="stat-label">PA</span>
                    <span class="stat-value" id="paDisplay">25</span>
                </div>
                <div class="turn-indicator" id="alertLevel">NIVEL DE ALERTA: BAJO</div>
            </div>
        </div>

        <div class="main-content">
            <!-- Sidebar Izquierdo -->
            <div class="sidebar">
                <div class="section-title">👥 TU EQUIPO</div>
                <div id="teamList"></div>
                <button class="btn" onclick="advanceTurn()" style="width:100%; margin-top:20px;">
                    ⏭️ SIGUIENTE TURNO
                </button>
            </div>

            <!-- Área Central -->
            <div class="game-area">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab(0)">MAPA</button>
                    <button class="tab" onclick="switchTab(1)">ACCIONES</button>
                    <button class="tab" onclick="switchTab(2)">MISIONES</button>
                </div>

                <!-- TAB MAPA -->
                <div class="tab-content active" id="tab0">
                    <h2 style="color:var(--gold); margin-bottom:15px;">Plano del Casino Lunar</h2>
                    <div class="map-container" id="mapContainer"></div>
                </div>

                <!-- TAB ACCIONES -->
                <div class="tab-content" id="tab1">
                    <h2 style="color:var(--gold); margin-bottom:15px;">Acciones Disponibles</h2>
                    <div class="actions-grid" id="actionsGrid"></div>
                </div>

                <!-- TAB MISIONES -->
                <div class="tab-content" id="tab2">
                    <h2 style="color:var(--gold); margin-bottom:15px;">Objetivos del Heist</h2>
                    <div id="missionsList"></div>
                </div>
            </div>

            <!-- Sidebar Derecho -->
            <div class="right-sidebar">
                <div class="section-title">PROGRESO</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:15%">15%</div>
                </div>
                <div class="section-title" style="margin-top:25px;">LOG</div>
                <div id="logContainer" style="max-height:400px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-text" id="modalText"></p>
            <div class="modal-buttons" id="modalButtons"></div>
        </div>
    </div>

    <script>
        let game = {
            turn: 1,
            maxTurns: 12,
            pa: 25,
            alertLevel: 0,
            progress: 15,
            team: [
                {name: "Raven", role: "Infiltradora", pa: 6, skill: "Sigilo"},
                {name: "Ghost", role: "Hacker", pa: 5, skill: "Tecnología"},
                {name: "Titan", role: "Fuerza", pa: 4, skill: "Combate"}
            ],
            clearedLevels: [],
            missions: [
                {id:1, title:"Desactivar Cámaras", completed:false},
                {id:2, title:"Robar la Bóveda Principal", completed:false},
                {id:3, title:"Escapar por Helipuerto", completed:false}
            ]
        };

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameContainer').classList.add('active');
            initGame();
        }

        function initGame() {
            updateUI();
            renderTeam();
            renderMap();
            renderActions();
            renderMissions();
            addLog("El heist ha comenzado...", "success");
        }

        function updateUI() {
            document.getElementById('turnDisplay').textContent = `${game.turn}/${game.maxTurns}`;
            document.getElementById('paDisplay').textContent = game.pa;
            
            const alertEl = document.getElementById('alertLevel');
            alertEl.textContent = game.alertLevel < 3 ? "NIVEL DE ALERTA: BAJO" : 
                                 game.alertLevel < 6 ? "NIVEL DE ALERTA: MEDIO" : "¡ALERTA MÁXIMA!";
            alertEl.style.background = game.alertLevel > 5 ? 'var(--danger)' : 'var(--warning)';
            
            document.getElementById('progressFill').style.width = game.progress + '%';
            document.getElementById('progressFill').textContent = game.progress + '%';
        }

        function renderTeam() {
            const container = document.getElementById('teamList');
            container.innerHTML = '';
            game.team.forEach((member, i) => {
                const div = document.createElement('div');
                div.className = 'team-member';
                div.innerHTML = `
                    <div class="member-name">${member.name}</div>
                    <div class="member-skill">${member.role} - ${member.skill}</div>
                    <div class="member-pa">PA: ${member.pa}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderMap() {
            const container = document.getElementById('mapContainer');
            container.innerHTML = `
                <div class="map-level" onclick="enterLevel(1)">Entrada Principal</div>
                <div class="map-level" onclick="enterLevel(2)">Sala de Máquinas</div>
                <div class="map-level" onclick="enterLevel(3)">Bóveda VIP</div>
                <div class="map-level" onclick="enterLevel(4)">Helipuerto</div>
            `;
        }

        function renderActions() {
            const actions = [
                {name:"Infiltración Sigilosa", cost:4, desc:"Avanza sin levantar sospechas"},
                {name:"Hackear Sistema", cost:5, desc:"Reduce nivel de alerta"},
                {name:"Distracción", cost:3, desc:"Baja temporalmente la alerta"},
                {name:"Robar Objetos", cost:6, desc:"Aumenta progreso"}
            ];
            
            const container = document.getElementById('actionsGrid');
            container.innerHTML = '';
            actions.forEach(act => {
                const card = document.createElement('div');
                card.className = 'action-card';
                card.innerHTML = `
                    <div class="action-name">${act.name}</div>
                    <div class="action-cost">PA: ${act.cost}</div>
                    <div class="action-desc">${act.desc}</div>
                `;
                card.onclick = () => performAction(act);
                container.appendChild(card);
            });
        }

        function performAction(action) {
            if (game.pa < action.cost) {
                showModal("PA Insuficiente", "No tienes suficientes puntos de acción.", "Cerrar");
                return;
            }
            game.pa -= action.cost;
            game.progress = Math.min(100, game.progress + 8);
            game.alertLevel += 1;
            
            addLog(`Ejecutaste: ${action.name}`, "success");
            updateUI();
        }

        function renderMissions() {
            const container = document.getElementById('missionsList');
            container.innerHTML = '';
            game.missions.forEach(m => {
                const div = document.createElement('div');
                div.className = `mission-item ${m.completed ? 'completed' : ''}`;
                div.innerHTML = `<strong>${m.title}</strong>`;
                container.appendChild(div);
            });
        }

        function enterLevel(level) {
            showModal("Nivel " + level, "¿Quieres iniciar esta fase del heist?", 
                `<button class="btn" onclick="completeLevel(${level});closeModal()">Sí, entrar</button>
                 <button class="btn" onclick="closeModal()">Cancelar</button>`);
        }

        function completeLevel(level) {
            if (!game.clearedLevels.includes(level)) {
                game.clearedLevels.push(level);
                game.progress += 20;
                addLog(`¡Nivel ${level} completado!`, "success");
                updateUI();
            }
            closeModal();
        }

        function advanceTurn() {
            game.turn++;
            game.pa = 25 + Math.floor(game.turn / 3);
            game.alertLevel = Math.max(0, game.alertLevel - 1);
            
            addLog(`Turno ${game.turn} comenzado`, "success");
            updateUI();

            if (game.turn >= game.maxTurns) {
                showModal("FIN DEL JUEGO", game.progress >= 80 ? 
                    "¡Felicidades! Lograste el gran heist." : 
                    "El tiempo se acabó... Fallaste el heist.");
            }
        }

        function addLog(message, type = "") {
            const log = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `> ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function switchTab(tabIndex) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === tabIndex);
            });
            document.querySelectorAll('.tab-content').forEach((c, i) => {
                c.classList.toggle('active', i === tabIndex);
            });
        }

        function showModal(title, text, buttons = "Cerrar") {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').innerHTML = text;
            document.getElementById('modalButtons').innerHTML = buttons;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function showInstructions() {
            showModal("Instrucciones", 
                "Planifica tu atraco en 12 turnos.<br><br>Administra tus PA, mantén baja la alerta y completa los objetivos.");
        }

        // Cerrar modal con Escape
        document.addEventListener('keydown', e => {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
