<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio-Infección Global: Ultimate Edition</title>

<style>
:root{
    --bg:#05070d;
    --panel:#101826;
    --panel2:#151f30;
    --line:#23314a;
    --text:#f5f7ff;
    --mut:#00f0ff;
    --danger:#ff3d5e;
    --heal:#2ed573;
    --gold:#ffcc00;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
        radial-gradient(circle at top,#182033 0%,#05070d 60%);
    color:var(--text);
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
    min-height:100vh;
    padding:15px;
    overflow-x:hidden;
}

h1{
    text-align:center;
    color:var(--danger);
    font-size:3em;
    margin-top:10px;
    text-shadow:0 0 20px rgba(255,61,94,.6);
    letter-spacing:3px;
}

.subtitle{
    text-align:center;
    color:#91a4c2;
    margin-bottom:18px;
    letter-spacing:3px;
    text-transform:uppercase;
}

#pantalla-inicio{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.selector-box{
    width:520px;
    background:linear-gradient(180deg,#141d2e,#0c111c);
    border:2px solid var(--line);
    border-radius:15px;
    padding:35px;
    box-shadow:0 0 40px rgba(0,240,255,.15);
    animation:spawn .6s ease;
}

@keyframes spawn{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.selector-box h2{
    text-align:center;
    margin-bottom:20px;
    color:var(--danger);
}

.pathogen-btn{
    width:100%;
    padding:15px;
    margin-top:12px;
    background:#1a2740;
    border:1px solid var(--line);
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition:.25s;
    font-size:1em;
    font-weight:bold;
}

.pathogen-btn:hover{
    background:#223555;
    border-color:var(--mut);
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(0,240,255,.2);
}

.ticker{
    width:100%;
    max-width:1350px;
    margin:auto;
    background:#080c13;
    border:1px solid var(--line);
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    color:var(--gold);
    font-family:monospace;
    overflow:hidden;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
    max-width:1350px;
    width:100%;
    margin:auto;
}

.stat-card{
    background:linear-gradient(180deg,var(--panel),#0f1520);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    position:relative;
    overflow:hidden;
    transition:.25s;
}

.stat-card:hover{
    transform:translateY(-4px);
}

.stat-card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);
    transform:translateX(-100%);
    animation:shine 6s infinite;
}

@keyframes shine{
    to{
        transform:translateX(100%);
    }
}

.stat-title{
    color:#a8b8d0;
    font-size:.9em;
}

.stat-value{
    margin-top:10px;
    font-size:2em;
    font-weight:900;
}

.adn .stat-value{color:var(--mut);}
.inf .stat-value{color:var(--danger);}
.dead .stat-value{color:#ff6b81;}
.cure .stat-value{color:var(--heal);}

.progress-container{
    width:100%;
    height:16px;
    background:#0c1118;
    border-radius:20px;
    overflow:hidden;
    border:1px solid #24334f;
    margin-top:10px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00f0ff,#00ffaa);
    transition:.4s;
}

.main-layout{
    width:100%;
    max-width:1350px;
    margin:auto;
    margin-top:15px;
    display:grid;
    grid-template-columns:1fr 420px;
    gap:15px;
}

@media(max-width:1100px){
    .main-layout{
        grid-template-columns:1fr;
    }
}

.panel{
    background:linear-gradient(180deg,var(--panel),#0e1521);
    border:1px solid var(--line);
    border-radius:15px;
    padding:18px;
}

.panel h3{
    margin-bottom:15px;
    color:#dce7ff;
    border-bottom:1px solid var(--line);
    padding-bottom:10px;
}

.map-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

.map-node{
    background:#141d2c;
    border:1px solid #263650;
    border-radius:10px;
    padding:12px;
    text-align:center;
    transition:.4s;
    position:relative;
    overflow:hidden;
}

.map-node:hover{
    transform:scale(1.03);
}

.map-node strong{
    display:block;
    margin-bottom:6px;
}

.country-list{
    max-height:480px;
    overflow:auto;
    padding-right:4px;
}

.country{
    background:#151f30;
    border:1px solid #22324d;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}

.country-top{
    display:flex;
    justify-content:space-between;
    font-size:.9em;
    margin-bottom:8px;
}

.country-bar{
    width:100%;
    height:10px;
    background:#0b1119;
    border-radius:20px;
    overflow:hidden;
}

.country-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff3d5e,#ff7b7b);
}

.tabs{
    display:flex;
    gap:8px;
    margin-bottom:12px;
}

.tab{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1a2740;
    color:#a8b8d0;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.tab.active{
    background:var(--gold);
    color:black;
}

.upgrades{
    max-height:500px;
    overflow:auto;
}

.upgrade{
    background:#161f31;
    border:1px solid #243552;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    transition:.25s;
}

.upgrade:hover{
    transform:translateY(-2px);
}

.upgrade-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.upgrade h4{
    margin-bottom:5px;
}

.upgrade p{
    color:#9cb0cb;
    font-size:.83em;
}

.buy-btn{
    min-width:90px;
    border:none;
    border-radius:10px;
    background:var(--mut);
    color:black;
    font-weight:bold;
    cursor:pointer;
    padding:10px;
}

.buy-btn:disabled{
    background:#34445e;
    color:#7e8ca3;
    cursor:not-allowed;
}

.control-btn{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#2574ff;
    color:white;
    font-weight:bold;
    font-size:1em;
}

.control-btn:hover{
    filter:brightness(1.1);
}

.flash{
    animation:flash .5s;
}

@keyframes flash{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

#gameOver{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.94);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:10000;
}

.gameover-box{
    width:600px;
    max-width:90%;
    background:#111827;
    border:2px solid var(--danger);
    border-radius:20px;
    padding:35px;
    text-align:center;
    animation:spawn .5s ease;
}

.gameover-box h2{
    font-size:2.4em;
    margin-bottom:15px;
}

.gameover-box p{
    color:#bcc8dd;
    margin-bottom:20px;
}

.restart-btn{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:var(--danger);
    color:white;
    font-size:1em;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="pantalla-inicio">
    <div class="selector-box">
        <h2>☣️ SELECCIONA TU PATÓGENO</h2>

        <button class="pathogen-btn" onclick="seleccionarPatogeno('Bacteria')">
            🧫 Bacteria — Mucho ADN inicial
        </button>

        <button class="pathogen-btn" onclick="seleccionarPatogeno('Virus')">
            🧬 Virus — Mutaciones aleatorias
        </button>

        <button class="pathogen-btn" onclick="seleccionarPatogeno('Parásito')">
            🐛 Parásito — Baja detección
        </button>
    </div>
</div>

<div id="gameOver">
    <div class="gameover-box">
        <h2 id="gameOverTitle"></h2>
        <p id="gameOverText"></p>
        <button class="restart-btn" onclick="location.reload()">
            🔄 REINICIAR PARTIDA
        </button>
    </div>
</div>

<h1>BIO-INFECCIÓN GLOBAL</h1>
<div class="subtitle" id="tipoPatogenoTexto">
    Inicializando cepa...
</div>

<div class="ticker" id="newsTicker">
📡 Preparando simulación pandémica...
</div>

<div class="stats-grid">

    <div class="stat-card adn">
        <div class="stat-title">🧬 PUNTOS ADN</div>
        <div class="stat-value" id="statAdn">0</div>
    </div>

    <div class="stat-card inf">
        <div class="stat-title">🦠 INFECTADOS</div>
        <div class="stat-value" id="statInf">1</div>
    </div>

    <div class="stat-card dead">
        <div class="stat-title">💀 MUERTES</div>
        <div class="stat-value" id="statDead">0</div>
    </div>

    <div class="stat-card cure">
        <div class="stat-title">🧪 CURA GLOBAL</div>
        <div class="stat-value" id="statCure">0%</div>

        <div class="progress-container">
            <div class="progress-bar" id="cureBar"></div>
        </div>
    </div>

</div>

<div class="main-layout">

    <div class="panel">

        <h3>🌍 MAPA MUNDIAL</h3>

        <div class="map-grid" id="mapGrid"></div>

        <br>

        <h3>📊 ESTADOS DE PAÍSES</h3>

        <div class="country-list" id="countryList"></div>

        <button class="control-btn" id="pauseBtn">
            ⏸️ PAUSAR SIMULACIÓN
        </button>

    </div>

    <div class="panel">

        <h3>🧬 MUTACIONES</h3>

        <div class="tabs">
            <button class="tab active" onclick="setTab('trans')" id="tab-trans">
                Transmisión
            </button>

            <button class="tab" onclick="setTab('sintoma')" id="tab-sintoma">
                Síntomas
            </button>

            <button class="tab" onclick="setTab('res')" id="tab-res">
                Resistencias
            </button>
        </div>

        <div class="upgrades" id="upgrades"></div>

    </div>

</div>

<script>

const paises = [
{ id:"esp",nombre:"España",pob:47000000,inf:1,dead:0,clima:"templado",rico:true },
{ id:"usa",nombre:"EE.UU",pob:331000000,inf:0,dead:0,clima:"templado",rico:true },
{ id:"bra",nombre:"Brasil",pob:214000000,inf:0,dead:0,clima:"calido",rico:false },
{ id:"rus",nombre:"Rusia",pob:144000000,inf:0,dead:0,clima:"frio",rico:false },
{ id:"chn",nombre:"China",pob:1412000000,inf:0,dead:0,clima:"templado",rico:true },
{ id:"ind",nombre:"India",pob:1390000000,inf:0,dead:0,clima:"calido",rico:false },
{ id:"jpn",nombre:"Japón",pob:125000000,inf:0,dead:0,clima:"templado",rico:true },
{ id:"can",nombre:"Canadá",pob:38000000,inf:0,dead:0,clima:"frio",rico:true },
{ id:"aus",nombre:"Australia",pob:26000000,inf:0,dead:0,clima:"calido",rico:true },
{ id:"grl",nombre:"Groenlandia",pob:56000,inf:0,dead:0,clima:"frio",rico:true }
];

const mejoras = [

{ id:"t1",cat:"trans",nombre:"Aerosoles",desc:"Contagio aéreo avanzado.",cost:6 },
{ id:"t2",cat:"trans",nombre:"Transmisión Marina",desc:"Expansión por barcos.",cost:8 },
{ id:"t3",cat:"trans",nombre:"Mutación Aviar",desc:"Salta fronteras.",cost:12 },

{ id:"s1",cat:"sintoma",nombre:"Tos",desc:"Más transmisión.",cost:5 },
{ id:"s2",cat:"sintoma",nombre:"Hemorragia",desc:"Aumenta letalidad.",cost:15 },
{ id:"s3",cat:"sintoma",nombre:"Fallo Orgánico",desc:"Letalidad extrema.",cost:30 },

{ id:"r1",cat:"res",nombre:"Resistencia Frío",desc:"Mejor expansión en países fríos.",cost:8 },
{ id:"r2",cat:"res",nombre:"Resistencia Medicamentos",desc:"Reduce eficacia médica.",cost:14 }

];

let adn = 15;
let cura = 0;
let pausado = false;
let tab = "trans";
let tipo = "Bacteria";

const totalMundial = paises.reduce((a,b)=>a+b.pob,0);

function seleccionarPatogeno(t){

    tipo = t;

    if(tipo==="Bacteria") adn = 25;
    if(tipo==="Virus") adn = 12;
    if(tipo==="Parásito") adn = 18;

    document.getElementById("pantalla-inicio").style.display="none";

    document.getElementById("tipoPatogenoTexto").innerText =
    "Patógeno activo: "+tipo;

    iniciar();
}

function iniciar(){

    renderMapa();
    renderPaises();
    renderMejoras();

    document.getElementById("pauseBtn").onclick=()=>{
        pausado=!pausado;

        document.getElementById("pauseBtn").innerText=
        pausado ?
        "▶️ REANUDAR SIMULACIÓN":
        "⏸️ PAUSAR SIMULACIÓN";
    };

    setInterval(loop,1000);
}

function renderMapa(){

    const map=document.getElementById("mapGrid");
    map.innerHTML="";

    paises.forEach(p=>{

        const div=document.createElement("div");
        div.className="map-node";
        div.id="map-"+p.id;

        div.innerHTML=`
        <strong>${p.nombre}</strong>
        <div id="status-${p.id}">Sano</div>
        `;

        map.appendChild(div);

    });

}

function renderPaises(){

    const c=document.getElementById("countryList");
    c.innerHTML="";

    paises.forEach(p=>{

        const infectPct=
        ((p.inf+p.dead)/p.pob)*100;

        const div=document.createElement("div");
        div.className="country";

        div.innerHTML=`
        <div class="country-top">
            <span>${p.nombre}</span>
            <span>🦠 ${format(p.inf)} | 💀 ${format(p.dead)}</span>
        </div>

        <div class="country-bar">
            <div class="country-fill"
            style="width:${Math.min(infectPct,100)}%"></div>
        </div>
        `;

        c.appendChild(div);

        const node=document.getElementById("map-"+p.id);
        const status=document.getElementById("status-"+p.id);

        if(p.dead>=p.pob*0.95){

            node.style.background="#2a0a12";
            node.style.borderColor="#ff3d5e";

            status.innerHTML="☠️ Colapsado";
            status.style.color="#ff6b81";

        }else if(p.inf>0){

            node.style.background="rgba(255,61,94,.2)";
            node.style.borderColor="#ff3d5e";

            status.innerHTML=
            "🦠 "+infectPct.toFixed(1)+"%";

            status.style.color="#ffb0b9";

        }else{

            node.style.background="#141d2c";
            node.style.borderColor="#263650";

            status.innerHTML="🟢 Sano";
            status.style.color="#8ea3bf";

        }

    });

}

function renderMejoras(){

    const up=document.getElementById("upgrades");
    up.innerHTML="";

    mejoras.filter(m=>m.cat===tab)
    .forEach(m=>{

        const comprado=m.buy;

        const div=document.createElement("div");
        div.className="upgrade";

        div.innerHTML=`
        <div class="upgrade-top">

            <div>
                <h4>${m.nombre}</h4>
                <p>${m.desc}</p>
            </div>

            <button class="buy-btn"
            ${comprado||adn<m.cost?"disabled":""}
            onclick="comprar('${m.id}')">

            ${comprado?"MUTADO":m.cost+" ADN"}

            </button>

        </div>
        `;

        up.appendChild(div);

    });

}

function setTab(t){

    tab=t;

    ["trans","sintoma","res"]
    .forEach(x=>{
        document
        .getElementById("tab-"+x)
        .classList.remove("active");
    });

    document
    .getElementById("tab-"+t)
    .classList.add("active");

    renderMejoras();
}

function comprar(id){

    const m=mejoras.find(x=>x.id===id);

    if(adn>=m.cost&&!m.buy){

        adn-=m.cost;
        m.buy=true;

        noticia("🧬 Nueva mutación: "+m.nombre);

        renderMejoras();
        actualizarStats();
    }
}

function loop(){

    if(pausado) return;

    let totalInf=0;
    let totalDead=0;

    const tos=check("s1");
    const hemo=check("s2");
    const organos=check("s3");

    const aire=check("t1");
    const mar=check("t2");
    const aves=check("t3");

    const frio=check("r1");
    const med=check("r2");

    paises.forEach(p=>{

        const vivos=p.pob-(p.inf+p.dead);

        if(p.inf>0&&vivos>0){

            let spread=.30;

            if(tos) spread+=.22;
            if(aire) spread+=.28;
            if(mar) spread+=.10;
            if(aves) spread+=.15;

            if(p.clima==="frio"&&!frio)
                spread*=.25;

            if(p.rico&&!med)
                spread*=.45;

            const nuevos=Math.min(
                vivos,
                Math.ceil(p.inf*spread)
            );

            p.inf+=nuevos;

            if(Math.random()<.22){
                adn++;
                animStat("statAdn");
            }
        }

        let lethality=0;

        if(hemo) lethality+=.015;
        if(organos) lethality+=.12;

        if(p.inf>0&&lethality>0){

            const muertes=
            Math.min(
                p.inf,
                Math.ceil(p.inf*lethality)
            );

            p.inf-=muertes;
            p.dead+=muertes;
        }

        totalInf+=p.inf;
        totalDead+=p.dead;

    });

    if(totalInf>500){

        paises.forEach(a=>{

            if(a.inf>500){

                paises.forEach(b=>{

                    if(b.inf===0){

                        let chance=.003;

                        if(aire) chance+=.03;
                        if(mar) chance+=.03;
                        if(aves) chance+=.05;

                        if(Math.random()<chance){

                            b.inf=10;

                            noticia(
                            "✈️ Infección detectada en "+
                            b.nombre
                            );

                            adn+=4;
                        }
                    }
                });
            }
        });
    }

    let vis=0;

    if(tos) vis+=8;
    if(hemo) vis+=30;
    if(organos) vis+=70;

    if(tipo==="Parásito")
        vis*=0.5;

    if(vis>5||totalInf>5000000){

        let speed=.08+(vis*.008);

        if(organos) speed*=0.45;

        cura+=speed;
    }

    if(tipo==="Virus"&&Math.random()<0.03){

        const libres=
        mejoras.filter(x=>!x.buy);

        if(libres.length){

            const random=
            libres[
                Math.floor(Math.random()*libres.length)
            ];

            random.buy=true;

            noticia(
            "⚠️ Mutación espontánea: "+
            random.nombre
            );

            renderMejoras();
        }
    }

    actualizarStats(
        totalInf,
        totalDead
    );

    renderPaises();

    const vivos=
    totalMundial-totalDead;

    if(totalDead>=totalMundial*.99){

        endGame(
        "☣️ VICTORIA TOTAL",
        "La humanidad ha sido erradicada."
        );

    }else if(cura>=100){

        endGame(
        "🛡️ DERROTA",
        "La cura mundial fue completada."
        );

    }else if(totalInf===0&&vivos>0){

        endGame(
        "💀 CEPA EXTINGUIDA",
        "La infección desapareció."
        );
    }
}

function actualizarStats(
inf=0,
dead=0
){

    document.getElementById("statAdn").innerText=
    format(adn);

    document.getElementById("statInf").innerText=
    format(inf);

    document.getElementById("statDead").innerText=
    format(dead);

    document.getElementById("statCure").innerText=
    Math.floor(cura)+"%";

    document.getElementById("cureBar")
    .style.width=
    Math.min(cura,100)+"%";
}

function noticia(t){

    document.getElementById("newsTicker")
    .innerHTML="📡 "+t;
}

function check(id){
    return mejoras.find(x=>x.id===id)?.buy;
}

function format(n){
    return n.toLocaleString("es-ES");
}

function animStat(id){

    const el=document.getElementById(id);

    el.classList.add("flash");

    setTimeout(()=>{
        el.classList.remove("flash");
    },500);
}

function endGame(title,text){

    pausado=true;

    document.getElementById("gameOver")
    .style.display="flex";

    document.getElementById("gameOverTitle")
    .innerText=title;

    document.getElementById("gameOverText")
    .innerText=text;
}

</script>

</body>
</html>
