<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Simulator — Vista Cenital</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;background:#1a1a2e;font-family:'Crimson Pro',serif}
#canvas{display:block;cursor:crosshair}
#ui{position:fixed;top:0;left:0;width:220px;height:100vh;background:rgba(8,6,18,0.88);border-right:1px solid rgba(255,220,120,0.15);display:flex;flex-direction:column;padding:14px 12px;gap:8px;backdrop-filter:blur(4px)}
#ui h1{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;color:#e8c87a;border-bottom:1px solid rgba(232,200,122,0.2);padding-bottom:8px;text-align:center}
.section-label{font-size:9px;letter-spacing:3px;color:rgba(200,180,120,0.4);text-transform:uppercase;padding:4px 0 2px}
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.tbtn{padding:7px 6px;border:1px solid rgba(255,255,255,0.1);border-radius:4px;background:rgba(255,255,255,0.04);color:rgba(220,210,190,0.8);font-family:'Crimson Pro',serif;font-size:12px;cursor:pointer;text-align:center;transition:all 0.15s;line-height:1.3}
.tbtn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,220,120,0.4);color:#fff}
.tbtn.active{background:rgba(232,200,122,0.18);border-color:rgba(232,200,122,0.7);color:#e8c87a}
.tbtn.wide{grid-column:1/-1}
.stat-block{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:8px 10px;font-size:11px;color:rgba(200,195,180,0.7);line-height:2}
.stat-row{display:flex;justify-content:space-between}
.stat-row b{color:rgba(232,200,122,0.9);font-weight:400}
.slider-wrap{display:flex;flex-direction:column;gap:3px}
.slider-wrap label{font-size:10px;color:rgba(200,180,120,0.5);letter-spacing:1px;display:flex;justify-content:space-between}
input[type=range]{width:100%;height:3px;accent-color:#e8c87a;cursor:pointer}
#eventlog{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;min-height:0}
.log-entry{font-size:10px;color:rgba(180,170,150,0.55);line-height:1.4;padding:1px 0}
.log-entry.important{color:rgba(232,200,122,0.75)}
.log-entry.disaster{color:rgba(255,100,80,0.75)}
#year-display{text-align:center;font-family:'Cinzel',serif;font-size:11px;color:rgba(232,200,122,0.5);letter-spacing:2px;padding:4px 0}
#speedrow{display:flex;gap:4px}
#speedrow button{flex:1;padding:4px;font-size:10px;font-family:'Crimson Pro',serif;border:1px solid rgba(255,255,255,0.1);border-radius:3px;background:rgba(255,255,255,0.04);color:rgba(200,190,170,0.7);cursor:pointer}
#speedrow button.active{background:rgba(232,200,122,0.15);border-color:rgba(232,200,122,0.5);color:#e8c87a}
#tooltip{position:fixed;display:none;background:rgba(8,6,18,0.95);border:1px solid rgba(232,200,122,0.3);border-radius:5px;padding:8px 12px;font-size:11px;color:rgba(220,210,190,0.9);pointer-events:none;max-width:180px;line-height:1.7;z-index:100}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <h1>GOD SIMULATOR</h1>
  <div id="year-display">AÑO 1</div>

  <div class="section-label">Creación</div>
  <div class="tool-grid">
    <button class="tbtn active" id="btn-human" onclick="setTool('human')">Humano</button>
    <button class="tbtn" id="btn-tree" onclick="setTool('tree')">Árbol</button>
    <button class="tbtn" id="btn-mountain" onclick="setTool('mountain')">Montaña</button>
    <button class="tbtn" id="btn-water" onclick="setTool('water')">Lago</button>
    <button class="tbtn" id="btn-village" onclick="setTool('village')">Aldea</button>
    <button class="tbtn" id="btn-gold" onclick="setTool('gold')">Mina de Oro</button>
  </div>

  <div class="section-label">Destrucción</div>
  <div class="tool-grid">
    <button class="tbtn" id="btn-fire" onclick="setTool('fire')">Fuego</button>
    <button class="tbtn" id="btn-meteor" onclick="setTool('meteor')">Meteorito</button>
    <button class="tbtn" id="btn-plague" onclick="setTool('plague')">Plaga</button>
    <button class="tbtn" id="btn-lightning" onclick="setTool('lightning')">Rayo</button>
    <button class="tbtn wide" id="btn-erase" onclick="setTool('erase')">Borrar zona</button>
  </div>

  <div class="section-label">Velocidad</div>
  <div id="speedrow">
    <button onclick="setSpeed(0)" id="sp0">⏸</button>
    <button class="active" onclick="setSpeed(1)" id="sp1">1x</button>
    <button onclick="setSpeed(3)" id="sp3">3x</button>
    <button onclick="setSpeed(8)" id="sp8">8x</button>
  </div>

  <div class="section-label">Mundo</div>
  <div class="stat-block">
    <div class="stat-row"><span>Humanos</span><b id="sHumans">0</b></div>
    <div class="stat-row"><span>Aldeas</span><b id="sVillages">0</b></div>
    <div class="stat-row"><span>Año</span><b id="sYear">1</b></div>
    <div class="stat-row"><span>Temperatura</span><b id="sTemp">templado</b></div>
    <div class="stat-row"><span>Incendios</span><b id="sFires">0</b></div>
  </div>

  <div class="section-label">Clima</div>
  <div class="slider-wrap">
    <label><span>Temperatura</span><span id="tempVal">0</span></label>
    <input type="range" min="-3" max="3" value="0" step="1" id="tempSlider" oninput="setTemp(this.value)">
  </div>

  <div class="section-label">Crónicas</div>
  <div id="eventlog"></div>
</div>

<div id="tooltip"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

// ── WORLD STATE ──────────────────────────────────────────────
const CELL = 6;
const COLS = Math.ceil(W / CELL);
const ROWS = Math.ceil(H / CELL);

// Terrain: 0=dirt, 1=grass, 2=forest, 3=water, 4=mountain, 5=sand
const terrain = new Uint8Array(COLS * ROWS);
const moisture = new Float32Array(COLS * ROWS);
const elevation = new Float32Array(COLS * ROWS);

// Entity arrays
let humans = [];
let villages = [];
let fires = [];
let meteors = [];
let plagues = [];
let lightnings = [];
let particles = [];

let tool = 'human';
let simSpeed = 1;
let year = 1;
let tick = 0;
let tempGlobal = 0; // -3 cold to +3 hot
let brushSize = 1;

// Perlin-ish noise
function hash(x, y) {
  let h = (x * 374761393 + y * 1103515245) >>> 0;
  h ^= h >> 16; h *= 0x45d9f3b; h ^= h >> 16;
  return (h >>> 0) / 0xffffffff;
}
function smoothNoise(x, y, scale) {
  const gx = Math.floor(x / scale), gy = Math.floor(y / scale);
  const fx = (x / scale) - gx, fy = (y / scale) - gy;
  const fx2 = fx*fx*(3-2*fx), fy2 = fy*fy*(3-2*fy);
  const a = hash(gx,gy), b = hash(gx+1,gy), c = hash(gx,gy+1), d = hash(gx+1,gy+1);
  return a + (b-a)*fx2 + (c-a)*fy2 + (d-a+b-c)*fx2*fy2;
}
function fractal(x, y, octaves, scale) {
  let v=0, amp=1, tot=0, s=scale;
  for(let i=0;i<octaves;i++){v+=smoothNoise(x,y,s)*amp;tot+=amp;amp*=0.5;s*=0.5;}
  return v/tot;
}

// Generate world
function generateWorld() {
  for(let r=0;r<ROWS;r++) {
    for(let c=0;c<COLS;c++) {
      const i = r*COLS+c;
      const e = fractal(c,r,4,80);
      const m = fractal(c+500,r+500,3,60);
      elevation[i] = e;
      moisture[i] = m;
      if(e < 0.32) { terrain[i]=3; } // water
      else if(e < 0.38) { terrain[i]=5; } // sand/shore
      else if(e > 0.78) { terrain[i]=4; } // mountain
      else if(m > 0.56 && e > 0.42) { terrain[i]=2; } // forest
      else if(e > 0.38) { terrain[i]=1; } // grass
      else { terrain[i]=0; }
    }
  }
}

// ── COLORS ───────────────────────────────────────────────────
const PALETTE = {
  water:   ['#1a4a7a','#1e5a8e','#244f78','#1b5280'],
  sand:    ['#c9a96e','#d4b07a','#c2a060','#cca872'],
  grass:   ['#3d7a3a','#427a3c','#4a8540','#3e7238'],
  forest:  ['#1e5c28','#1a5024','#235e2c','#1f5826'],
  mountain:['#7a6e62','#6e6256','#857870','#7c7268'],
  dirt:    ['#6b4f3a','#5e4530','#6a4c38','#634834'],
};

function terrainColor(type, cx, cy) {
  const pal = [PALETTE.dirt,PALETTE.grass,PALETTE.forest,PALETTE.water,PALETTE.mountain,PALETTE.sand][type];
  return pal[((cx>>1)+(cy>>1))&3];
}

// ── TERRAIN CANVAS ───────────────────────────────────────────
const terrainCanvas = document.createElement('canvas');
terrainCanvas.width = W; terrainCanvas.height = H;
const tctx = terrainCanvas.getContext('2d');
const imgData = tctx.createImageData(W, H);

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function buildTerrainImage() {
  const data = imgData.data;
  for(let r=0;r<ROWS;r++) {
    for(let c=0;c<COLS;c++) {
      const t = terrain[r*COLS+c];
      const e = elevation[r*COLS+c];
      const col = hexToRgb(terrainColor(t, c, r));
      // shade by elevation slightly
      const shade = t===4 ? (e-0.78)/0.22 * 60 : (t===3 ? (0.32-Math.min(e,0.32))/0.32*30 : 0);
      for(let py=0;py<CELL;py++) {
        for(let px=0;px<CELL;px++) {
          const pi = ((r*CELL+py)*W + (c*CELL+px))*4;
          data[pi]   = Math.min(255, col[0]+shade);
          data[pi+1] = Math.min(255, col[1]+shade);
          data[pi+2] = Math.min(255, col[2]+shade);
          data[pi+3] = 255;
        }
      }
    }
  }
  tctx.putImageData(imgData, 0, 0);
}

// ── ENTITIES ─────────────────────────────────────────────────
const HUMAN_COLORS = ['#f5d5b0','#e8c49a','#d4a574','#c8956a','#b8855a'];
const JOB_COLORS = {farmer:'#a8c870',warrior:'#c85050',merchant:'#d4b050',builder:'#9090b0',priest:'#c8a0e0'};
const JOBS = ['farmer','farmer','farmer','warrior','merchant','builder','priest'];

class Human {
  constructor(x,y,villageRef=null) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5)*0.6;
    this.vy = (Math.random()-0.5)*0.6;
    this.size = 2.5;
    this.color = HUMAN_COLORS[Math.floor(Math.random()*HUMAN_COLORS.length)];
    this.hp = 100;
    this.age = Math.floor(Math.random()*40)+15;
    this.maxAge = 55 + Math.floor(Math.random()*35);
    this.village = villageRef;
    this.job = JOBS[Math.floor(Math.random()*JOBS.length)];
    this.wanderTimer = 0;
    this.targetX = x; this.targetY = y;
    this.state = 'wander'; // wander, flee, work
    this.plagued = false;
    this.plagueTimer = 0;
    this.reproTimer = Math.floor(Math.random()*600);
    this.name = randomName();
  }
  update() {
    this.age += 0.003;
    if(this.age > this.maxAge) { this.hp -= 1; }

    // Temperature damage
    if(tempGlobal >= 3) this.hp -= 0.02;
    if(tempGlobal <= -3) this.hp -= 0.015;

    // Plague
    if(this.plagued) {
      this.plagueTimer--;
      this.hp -= 0.3;
      if(this.plagueTimer <= 0) this.plagued = false;
      // Spread
      if(Math.random()<0.005) {
        humans.forEach(h=>{
          if(h!==this && !h.plagued && dist(h,this)<20) {
            h.plagued=true; h.plagueTimer=300+Math.floor(Math.random()*200);
          }
        });
      }
    }

    // Fire damage
    fires.forEach(f=>{
      if(dist2(this.x,this.y,f.x,f.y) < 35*35) this.hp -= 0.4;
    });

    // Movement
    this.wanderTimer--;
    if(this.wanderTimer <= 0) {
      this.wanderTimer = 60 + Math.floor(Math.random()*120);
      let tx, ty, tries=0;
      do {
        const range = this.village ? 80 : 160;
        const cx = this.village ? this.village.x : this.x;
        const cy = this.village ? this.village.y : this.y;
        tx = cx + (Math.random()-0.5)*range*2;
        ty = cy + (Math.random()-0.5)*range*2;
        tries++;
      } while(tries<10 && getTerrainAt(tx,ty)===3);
      this.targetX = Math.max(220,Math.min(W-4,tx));
      this.targetY = Math.max(4,Math.min(H-4,ty));
    }
    const dx = this.targetX-this.x, dy = this.targetY-this.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if(d>2) {
      const spd = this.job==='warrior'?0.9:0.55;
      this.x += dx/d*spd;
      this.y += dy/d*spd;
    }
    this.x = Math.max(222,Math.min(W-4,this.x));
    this.y = Math.max(4,Math.min(H-4,this.y));

    // Reproduction
    if(this.village && this.age>18 && this.age<45) {
      this.reproTimer--;
      if(this.reproTimer<=0) {
        this.reproTimer = 400+Math.floor(Math.random()*600);
        const v = this.village;
        if(v.population<v.capacity) {
          const h = new Human(v.x+(Math.random()-0.5)*40, v.y+(Math.random()-0.5)*40, v);
          h.age = 0; h.maxAge = 50+Math.floor(Math.random()*40);
          humans.push(h);
          v.population++;
          if(Math.random()<0.05) addLog(`Nació ${h.name} en ${v.name}.`, false);
        }
      }
    }
  }
  draw() {
    const alpha = this.hp < 30 ? 0.5 : 1;
    ctx.globalAlpha = alpha;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(this.x+1, this.y+1.5, this.size*0.9, this.size*0.45, 0,0,Math.PI*2);
    ctx.fill();
    // Body
    ctx.fillStyle = this.plagued ? '#88cc44' : this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    // Job dot
    ctx.fillStyle = JOB_COLORS[this.job];
    ctx.beginPath();
    ctx.arc(this.x, this.y-this.size-1, 1.2, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Village {
  constructor(x,y) {
    this.x=x; this.y=y;
    this.name=randomVillageName();
    this.population=0;
    this.capacity=20+Math.floor(Math.random()*30);
    this.level=1;
    this.age=0;
    this.gold=0;
    this.hp=100;
    this.buildTimer=0;
    this.color=`hsl(${30+Math.random()*30},${40+Math.random()*20}%,${35+Math.random()*15}%)`;
    this.wallColor=`hsl(${20+Math.random()*20},${20+Math.random()*15}%,${55+Math.random()*20}%)`;
    // Spawn initial humans
    for(let i=0;i<4+Math.floor(Math.random()*4);i++) {
      const h = new Human(x+(Math.random()-0.5)*50, y+(Math.random()-0.5)*50, this);
      h.age = 18+Math.floor(Math.random()*20);
      humans.push(h); this.population++;
    }
  }
  update() {
    this.age++;
    this.gold += this.level * 0.02;
    // Level up
    if(this.population >= this.capacity*0.8 && this.level < 5 && this.gold >= this.level*50) {
      this.level++;
      this.capacity += 15;
      this.gold -= (this.level-1)*50;
      addLog(`${this.name} alcanzó nivel ${this.level}.`, true);
      for(let i=0;i<3;i++) {
        const h = new Human(this.x+(Math.random()-0.5)*60, this.y+(Math.random()-0.5)*60, this);
        h.age = 20+Math.floor(Math.random()*20);
        humans.push(h); this.population++;
      }
    }
  }
  draw() {
    const sz = 10+this.level*4;
    // Ground patch
    ctx.fillStyle = '#5a4020';
    ctx.fillRect(this.x-sz-2, this.y-sz-2, sz*2+4, sz*2+4);
    // Wall
    ctx.fillStyle = this.wallColor;
    ctx.fillRect(this.x-sz, this.y-sz, sz*2, sz*2);
    // House blocks
    const blockSize = Math.max(5, sz/2-2);
    const houseColors = ['#8b6340','#7a5530','#9a7050','#8a6045'];
    for(let i=0;i<Math.min(this.level*2+2,8);i++) {
      const hx = this.x - sz + 4 + (i%3)*(blockSize+3);
      const hy = this.y - sz + 4 + Math.floor(i/3)*(blockSize+3);
      ctx.fillStyle = houseColors[i%4];
      ctx.fillRect(hx, hy, blockSize, blockSize);
      ctx.fillStyle = '#3a2010';
      ctx.fillRect(hx+1, hy+1, blockSize-4, blockSize*0.4); // roof
    }
    // Name
    ctx.fillStyle = 'rgba(255,240,200,0.85)';
    ctx.font = `bold ${9+this.level}px 'Cinzel',serif`;
    ctx.textAlign = 'center';
    ctx.fillText(this.name, this.x, this.y+sz+12);
    // Population bar
    const pct = this.population/this.capacity;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(this.x-sz, this.y+sz+3, sz*2, 3);
    ctx.fillStyle = pct>0.8?'#e06030':pct>0.5?'#d0a030':'#60c040';
    ctx.fillRect(this.x-sz, this.y+sz+3, sz*2*pct, 3);
  }
}

class Fire {
  constructor(x,y,radius=18) {
    this.x=x; this.y=y; this.r=radius; this.life=200+Math.random()*300;
    this.maxLife=this.life; this.spreadTimer=40;
  }
  update() {
    this.life--;
    this.spreadTimer--;
    // Spread to trees
    if(this.spreadTimer<=0) {
      this.spreadTimer=30+Math.random()*40;
      const c=Math.floor(this.x/CELL), r=Math.floor(this.y/CELL);
      for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++) {
        const nc=c+dc, nr=r+dr;
        if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS) {
          const t=terrain[nr*COLS+nc];
          if((t===2||t===1)&&Math.random()<0.15) {
            fires.push(new Fire(nc*CELL+CELL/2, nr*CELL+CELL/2, 14));
            terrain[nr*COLS+nc] = 0;
            dirtyTerrain = true;
          }
        }
      }
    }
    // Water extinguish
    const c=Math.floor(this.x/CELL), r=Math.floor(this.y/CELL);
    if(terrain[r*COLS+c]===3) this.life=0;
    // Weather
    if(tempGlobal<=-2) this.life-=0.5;
    if(tempGlobal>=2) this.life+=0.1;
  }
  draw() {
    const t = this.life/this.maxLife;
    const flicker = Math.random()*4;
    // Outer glow
    ctx.fillStyle = `rgba(255,80,0,${0.15*t})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r*2+flicker, 0, Math.PI*2);
    ctx.fill();
    // Core
    ctx.fillStyle = `rgba(255,${120+Math.random()*80},0,${0.7*t})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r+flicker, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,255,${Math.random()*100},${0.9*t})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r*0.4+flicker*0.5, 0, Math.PI*2);
    ctx.fill();
    // Smoke
    ctx.fillStyle = `rgba(60,60,60,${0.15*t})`;
    ctx.beginPath();
    ctx.arc(this.x+(Math.random()-0.5)*8, this.y-this.r-flicker*2, this.r*0.6, 0, Math.PI*2);
    ctx.fill();
  }
}

class Meteor {
  constructor(tx,ty) {
    this.x=tx-200+Math.random()*100; this.y=-80;
    this.tx=tx; this.ty=ty;
    const dx=tx-this.x, dy=ty-this.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    this.vx=dx/d*12; this.vy=dy/d*12;
    this.r=18+Math.random()*12;
    this.done=false;
    this.trail=[];
  }
  update() {
    this.trail.push({x:this.x,y:this.y,r:this.r});
    if(this.trail.length>15) this.trail.shift();
    this.x+=this.vx; this.y+=this.vy;
    if(this.y>=this.ty||this.y>H) {
      this.done=true;
      // Impact
      for(let i=0;i<6;i++) fires.push(new Fire(this.tx+(Math.random()-0.5)*60, this.ty+(Math.random()-0.5)*60, 22));
      // Blast particles
      for(let i=0;i<30;i++) particles.push({x:this.tx,y:this.ty,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:60,color:'#f0a030',r:3+Math.random()*4});
      // Crater
      const cc=Math.floor(this.tx/CELL), cr=Math.floor(this.ty/CELL);
      for(let dr=-4;dr<=4;dr++) for(let dc=-4;dc<=4;dc++) {
        if(dc*dc+dr*dr<=16) {
          const nc=cc+dc, nr=cr+dr;
          if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS && terrain[nr*COLS+nc]!==3) {
            terrain[nr*COLS+nc]=0;
          }
        }
      }
      dirtyTerrain=true;
      addLog('Un meteorito impactó la tierra. El mundo tiembla.', true);
      humans.forEach(h=>{if(dist2(h.x,h.y,this.tx,this.ty)<100*100)h.hp-=80;});
    }
  }
  draw() {
    this.trail.forEach((t,i)=>{
      const a=(i/this.trail.length)*0.6;
      ctx.fillStyle=`rgba(255,160,40,${a})`;
      ctx.beginPath();
      ctx.arc(t.x,t.y,t.r*(i/this.trail.length),0,Math.PI*2);
      ctx.fill();
    });
    ctx.fillStyle='#888';
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#aaa';
    ctx.beginPath();
    ctx.arc(this.x-this.r*0.3,this.y-this.r*0.3,this.r*0.35,0,Math.PI*2);
    ctx.fill();
  }
}

class Plague {
  constructor(x,y) {
    this.x=x; this.y=y; this.r=60; this.life=400;
  }
  update() {
    this.life--;
    this.r=Math.min(this.r+0.05,120);
    humans.forEach(h=>{
      if(!h.plagued && dist2(h.x,h.y,this.x,this.y)<this.r*this.r && Math.random()<0.003) {
        h.plagued=true; h.plagueTimer=400+Math.floor(Math.random()*300);
      }
    });
  }
  draw() {
    const t=this.life/400;
    ctx.fillStyle=`rgba(80,200,40,${0.06*t})`;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle=`rgba(80,200,40,${0.15*t})`;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.stroke();
  }
}

class Lightning {
  constructor(x,y) {
    this.x=x;this.y=y;this.life=20;
    this.segments=buildLightning(x,y);
    // Kill nearby
    humans.forEach(h=>{if(dist2(h.x,h.y,x,y)<40*40){h.hp-=120;particles.push({x:h.x,y:h.y,vx:0,vy:-3,life:30,color:'#ffff80',r:4});}});
    const c=Math.floor(x/CELL),r=Math.floor(y/CELL);
    if(c>=0&&c<COLS&&r>=0&&r<ROWS&&terrain[r*COLS+c]!==3){
      fires.push(new Fire(x,y,20));
    }
  }
  update(){this.life--;}
  draw(){
    const a=this.life/20;
    ctx.strokeStyle=`rgba(220,220,255,${a})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    this.segments.forEach((s,i)=>i===0?ctx.moveTo(s.x,s.y):ctx.lineTo(s.x,s.y));
    ctx.stroke();
    ctx.strokeStyle=`rgba(180,180,255,${a*0.5})`;
    ctx.lineWidth=5;
    ctx.beginPath();
    this.segments.forEach((s,i)=>i===0?ctx.moveTo(s.x,s.y):ctx.lineTo(s.x,s.y));
    ctx.stroke();
  }
}

function buildLightning(x,y) {
  const segs=[{x,y:0}];
  let cx=x,cy=0;
  while(cy<y){cy+=20+Math.random()*20;cx+=( Math.random()-0.5)*40;segs.push({x:cx,y:cy});}
  segs.push({x,y});
  return segs;
}

class GoldMine {
  constructor(x,y){this.x=x;this.y=y;this.gold=200+Math.floor(Math.random()*300);this.active=true;}
  draw(){
    if(!this.active)return;
    ctx.fillStyle='#8a7020';
    ctx.fillRect(this.x-8,this.y-8,16,16);
    ctx.fillStyle='#f0c820';
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.arc(this.x-4+i*4,this.y-1+Math.sin(i)*3,2,0,Math.PI*2);
      ctx.fill();
    }
  }
}

let goldMines = [];
let dirtyTerrain = false;

// ── HELPERS ──────────────────────────────────────────────────
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function dist2(x1,y1,x2,y2){return (x1-x2)**2+(y1-y2)**2;}
function getTerrainAt(x,y){
  const c=Math.floor(x/CELL), r=Math.floor(y/CELL);
  if(c<0||c>=COLS||r<0||r>=ROWS)return -1;
  return terrain[r*COLS+c];
}
function setTerrainAt(x,y,t){
  const c=Math.floor(x/CELL), r=Math.floor(y/CELL);
  if(c<0||c>=COLS||r<0||r>=ROWS)return;
  terrain[r*COLS+c]=t; dirtyTerrain=true;
}

const FIRST=['Ael','Bran','Cael','Dor','Edric','Fael','Gaor','Hel','Ir','Jyr','Kael','Lor','Myr','Nen','Oel','Phar','Qor','Rael','Sel','Thr','Ur','Vor','Wael','Xor','Yel','Zael','Aric','Brel','Caer','Dael'];
const LAST=['of','son','mir','wick','ford','vale','wood','fell','stone','mire','crest','well','helm','port','reach','watch'];
function randomName(){return FIRST[Math.floor(Math.random()*FIRST.length)]+" "+LAST[Math.floor(Math.random()*LAST.length)];}
const VNAMES=['Ashford','Brynmere','Caldwick','Dunvale','Elmhurst','Foxwood','Greystone','Hollowfell','Ironport','Jadestone','Keltmoor','Lumenvale','Morwick','Noctreach','Oldwatch','Pinewatch','Queensford','Ravenfall','Stonecrest','Thornmere'];
function randomVillageName(){return VNAMES[Math.floor(Math.random()*VNAMES.length)]+(Math.random()<0.3?' II':'');}

// ── LOG ──────────────────────────────────────────────────────
const logEntries=[];
function addLog(msg,important=false){
  logEntries.push({msg,important,disaster:msg.toLowerCase().includes('meteorito')||msg.toLowerCase().includes('plaga')||msg.toLowerCase().includes('fuego')});
  if(logEntries.length>12)logEntries.shift();
  const el=document.getElementById('eventlog');
  el.innerHTML=logEntries.map(e=>`<div class="log-entry${e.important?' important':''}${e.disaster?' disaster':''}">${e.msg}</div>`).join('');
}

// ── UI ───────────────────────────────────────────────────────
function setTool(t){
  tool=t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('btn-'+t);
  if(el)el.classList.add('active');
}
function setSpeed(s){
  simSpeed=s;
  ['sp0','sp1','sp3','sp8'].forEach(id=>{document.getElementById(id).classList.remove('active');});
  document.getElementById('sp'+s).classList.add('active');
}
function setTemp(v){
  tempGlobal=parseInt(v);
  document.getElementById('tempVal').textContent=v;
  const labels=['polar','helado','frío','templado','cálido','caluroso','abrasador'];
  document.getElementById('sTemp').textContent=labels[tempGlobal+3];
}

// ── INPUT ────────────────────────────────────────────────────
let painting=false;
let lastPaintX=-999,lastPaintY=-999;

canvas.addEventListener('mousedown',e=>{if(e.clientX>220){painting=true;applyTool(e.clientX,e.clientY,e);}});
canvas.addEventListener('mousemove',e=>{
  if(painting&&e.clientX>220){
    if(dist2(e.clientX,e.clientY,lastPaintX,lastPaintY)>100){
      applyTool(e.clientX,e.clientY,e);
      lastPaintX=e.clientX;lastPaintY=e.clientY;
    }
  }
  // Tooltip
  showTooltip(e.clientX,e.clientY);
});
canvas.addEventListener('mouseup',()=>painting=false);
canvas.addEventListener('mouseleave',()=>{painting=false;document.getElementById('tooltip').style.display='none';});

function applyTool(x,y,e){
  if(x<=220)return;
  switch(tool){
    case 'human':
      if(getTerrainAt(x,y)!==3){
        humans.push(new Human(x,y));
        if(Math.random()<0.1)addLog(`${humans[humans.length-1].name} llega al mundo.`,false);
      }
      break;
    case 'tree':
      for(let i=0;i<3;i++){
        const tx=x+(Math.random()-0.5)*30, ty=y+(Math.random()-0.5)*30;
        setTerrainAt(tx,ty,2);
      }
      break;
    case 'mountain':
      for(let i=0;i<5;i++){
        const tx=x+(Math.random()-0.5)*40, ty=y+(Math.random()-0.5)*40;
        setTerrainAt(tx,ty,4);
      }
      break;
    case 'water':
      for(let i=0;i<6;i++){
        const tx=x+(Math.random()-0.5)*50, ty=y+(Math.random()-0.5)*50;
        setTerrainAt(tx,ty,3);
      }
      break;
    case 'village':
      if(getTerrainAt(x,y)!==3&&getTerrainAt(x,y)!==4){
        const v=new Village(x,y);
        villages.push(v);
        addLog(`Fundada ${v.name}.`,true);
      }
      break;
    case 'gold':
      if(getTerrainAt(x,y)!==3) goldMines.push(new GoldMine(x,y));
      break;
    case 'fire':
      fires.push(new Fire(x,y,20));
      addLog('El fuego divino consume la tierra.',false);
      break;
    case 'meteor':
      meteors.push(new Meteor(x,y));
      break;
    case 'plague':
      plagues.push(new Plague(x,y));
      addLog('Una plaga oscura desciende sobre las tierras.',true);
      break;
    case 'lightning':
      lightnings.push(new Lightning(x,y));
      break;
    case 'erase':
      humans=humans.filter(h=>dist2(h.x,h.y,x,y)>50*50);
      fires=fires.filter(f=>dist2(f.x,f.y,x,y)>50*50);
      villages=villages.filter(v=>dist2(v.x,v.y,x,y)>60*60);
      plagues=plagues.filter(p=>dist2(p.x,p.y,x,y)>60*60);
      break;
  }
}

function showTooltip(mx,my){
  const tt=document.getElementById('tooltip');
  if(mx<=220){tt.style.display='none';return;}
  let info=null;
  // Check humans
  for(const h of humans){
    if(dist2(h.x,h.y,mx,my)<15*15){
      info=`<b style="color:#e8c87a">${h.name}</b><br>Trabajo: ${h.job}<br>Edad: ${Math.floor(h.age)}<br>HP: ${Math.floor(h.hp)}/100${h.plagued?'<br><span style="color:#88cc44">⚠ Infectado</span>':''}`;
      break;
    }
  }
  if(!info) for(const v of villages){
    if(dist2(v.x,v.y,mx,my)<50*50){
      info=`<b style="color:#e8c87a">${v.name}</b><br>Nivel: ${v.level}<br>Población: ${v.population}/${v.capacity}<br>Oro: ${Math.floor(v.gold)}`;
      break;
    }
  }
  if(info){
    tt.style.display='block';
    tt.style.left=(mx+14)+'px';
    tt.style.top=(my-10)+'px';
    tt.innerHTML=info;
  } else {tt.style.display='none';}
}

// ── UPDATE STATS ─────────────────────────────────────────────
let lastStatUpdate=0;
function updateStats(){
  document.getElementById('sHumans').textContent=humans.length;
  document.getElementById('sVillages').textContent=villages.length;
  document.getElementById('sYear').textContent=year;
  document.getElementById('sFires').textContent=fires.length;
  document.getElementById('year-display').textContent='AÑO '+year;
  // Random events
  if(Math.random()<0.001&&humans.length>10){
    const h=humans[Math.floor(Math.random()*humans.length)];
    addLog(`${h.name} descubrió una antigua reliquia.`,false);
  }
  if(Math.random()<0.0005&&villages.length>=2){
    const v1=villages[Math.floor(Math.random()*villages.length)];
    const v2=villages[Math.floor(Math.random()*villages.length)];
    if(v1!==v2)addLog(`${v1.name} y ${v2.name} establecen una alianza.`,true);
  }
}

// ── WEATHER OVERLAY ──────────────────────────────────────────
let snow=[];
function updateSnow(){
  if(tempGlobal<=-2){
    while(snow.length<300){snow.push({x:220+Math.random()*(W-220),y:Math.random()*H,spd:0.5+Math.random()*1.5,size:1+Math.random()*2});}
  } else { snow.length=0; }
}

// ── RENDER ───────────────────────────────────────────────────
let terrainBuilt=false;
function loop(){
  requestAnimationFrame(loop);
  const steps=simSpeed===0?0:simSpeed;

  for(let s=0;s<steps;s++){
    tick++;
    if(tick%200===0){year++;updateStats();}

    if(dirtyTerrain){buildTerrainImage();dirtyTerrain=false;}

    villages.forEach(v=>v.update());
    humans.forEach(h=>h.update());
    fires.forEach(f=>f.update());
    meteors.forEach(m=>m.update());
    plagues.forEach(p=>p.update());
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});

    // Cleanup
    fires=fires.filter(f=>f.life>0);
    humans=humans.filter(h=>{
      if(h.hp<=0){
        if(h.village){h.village.population=Math.max(0,h.village.population-1);}
        if(Math.random()<0.05)addLog(`${h.name} ha muerto.`,false);
        return false;
      }
      return true;
    });
    meteors=meteors.filter(m=>!m.done);
    plagues=plagues.filter(p=>p.life>0);
    lightnings=lightnings.filter(l=>l.life>0);
    particles=particles.filter(p=>p.life>0);

    updateSnow();
    if(tick%60===0)updateStats();
  }

  // ── DRAW ──────────────────────────────────────────────────
  if(!terrainBuilt){buildTerrainImage();terrainBuilt=true;}
  ctx.drawImage(terrainCanvas,0,0);

  // Temperature tint
  if(tempGlobal>=2){
    ctx.fillStyle=`rgba(255,100,0,${(tempGlobal-1)*0.04})`;
    ctx.fillRect(220,0,W-220,H);
  }
  if(tempGlobal<=-2){
    ctx.fillStyle=`rgba(180,220,255,${(-tempGlobal-1)*0.08})`;
    ctx.fillRect(220,0,W-220,H);
  }

  // Entities bottom-up order
  plagues.forEach(p=>p.draw());
  goldMines.forEach(g=>g.draw());
  villages.forEach(v=>v.draw());
  fires.forEach(f=>f.draw());
  humans.forEach(h=>h.draw());
  meteors.forEach(m=>m.draw());
  lightnings.forEach(l=>l.draw());

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/60;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;

  // Snow
  ctx.fillStyle='rgba(240,248,255,0.85)';
  snow.forEach(s=>{
    s.y+=s.spd; s.x+=Math.sin(tick*0.02+s.x)*0.3;
    if(s.y>H)s.y=0;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
  });

  // Rain
  if(tempGlobal===1||tempGlobal===2){
    ctx.strokeStyle='rgba(150,180,220,0.25)';
    ctx.lineWidth=1;
    for(let i=0;i<80;i++){
      const rx=220+Math.random()*(W-220),ry=Math.random()*H;
      ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx+2,ry+8);ctx.stroke();
    }
  }
}

generateWorld();
buildTerrainImage();
loop();
addLog('El mundo fue creado. La historia comienza.',true);

window.addEventListener('resize',()=>{
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  buildTerrainImage();
});
</script>
