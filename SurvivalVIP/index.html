<html lang="es">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #0a0a2e;

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}
h1 {
    font-size: 2.2em;
    font-weight: 900;
    background: linear-gradient(135deg, #667eea, #764ba2);

    -webkit-text-fill-color: transparent;
    background-clip: text;

    letter-spacing: 2px;
}
.vip-tag {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #000;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 0.8em;
    font-weight: 700;
    margin-bottom: 20px;
    display: inline-block;
}
#game {
    width: 100%;
    max-width: 650px;
    background: #111145;
    border: 1px solid rgba(102, 126, 234, 0.3);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 40px rgba(102, 126, 234, 0.15);
}
.stats { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
.stat-box {
    flex: 1; min-width: 80px;
    background: #161655;
    border: 1px solid rgba(102, 126, 234, 0.2);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    transition: all 0.3s;
}
.stat-box:hover { border-color: rgba(102, 126, 234, 0.5); }
.stat-label { font-size: 0.7em; color: #7070a0; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
.stat-val { font-size: 1.3em; font-weight: 700; }
.stat-val.hp { color: #ff4466; }
.stat-val.hunger { color: #ff9900; }
.stat-val.thirst { color: #4facfe; }
.stat-val.day { color: #667eea; }
.bar-wrap { background: #0a0a2e; border-radius: 4px; height: 6px; margin-top: 6px; }
.bar { height: 6px; border-radius: 4px; transition: width 0.4s; }
.bar.hp { background: linear-gradient(90deg, #ff4466, #ff6b8a); }
.bar.hunger { background: linear-gradient(90deg, #ff9900, #ffcc00); }
.bar.thirst { background: linear-gradient(90deg, #4facfe, #00f2fe); }

.inventory {
    background: #0a0a2e;
    border: 1px solid rgba(102, 126, 234, 0.15);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.85em;
    color: #7070a0;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;

.inv-item { display: flex; align-items: center; gap: 4px; }
.inv-item span { color: #667eea; font-weight: 600; }

#log {
    background: #0a0a2e;

    padding: 14px 16px;
    border-radius: 10px;
    font-size: 0.9em;
    color: #c0c0e0;
    min-height: 70px;
    margin-bottom: 18px;
    line-height: 1.7;

#log .good { color: #4ade80; }
#log .bad { color: #ff4466; }
#log .neutral { color: #c0c0e0; }
#log .event { color: #fbbf24; }

.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {

    border-color: transparent;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    transform: translateY(-1px);
}
.opt-btn:active { transform: translateY(0); }

#overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 46, 0.95);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 99;
    backdrop-filter: blur(10px);
}
#overlay.show { display: flex; }
#overlay h2 { font-size: 2.8em; margin-bottom: 10px; }
#overlay p { color: #7070a0; margin-bottom: 10px; font-size: 1.1em; }
#overlay .score-detail { color: #c0c0e0; font-size: 0.9em; margin-bottom: 25px; }
#overlay button {

#overlay button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
.dead h2 { color: #ff4466; }
.win h2 { color: #ffd700; }

.record-bar {
    background: #161655;
    border: 1px solid rgba(102, 126, 234, 0.2);
    border-radius: 10px;
    padding: 8px 14px;
    margin-bottom: 16px;
    font-size: 0.8em;
    color: #7070a0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.record-bar .record-val { color: #ffd700; font-weight: 700; }

footer {
    margin-top: 30px;
    color: #7070a0;
    font-size: 0.8em;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

@media(max-width:480px) {
    h1 { font-size: 1.6em; }
    #game { padding: 16px; }
    .stat-box { min-width: 70px; padding: 8px; }
    .stat-val { font-size: 1.1em; }
}
</style>
</head>

function saveRecord(dias) {
    var r = parseInt(localStorage.getItem('mg_survival_record') || '0');
    var g = parseInt(localStorage.getItem('mg_survival_games') || '0');
    if(dias > r) localStorage.setItem('mg_survival_record', dias);
    localStorage.setItem('mg_survival_games', g + 1);
    loadRecord();
}

function resetGame() {
    state = {
        dia: 1, hp: 100, hambre: 100, sed: 100, zone: 0,
        rescate: false, balsa: false, escaped: false,
        inv: { madera: 0, comida: 3, agua: 2, lanza: false, cabana: false, fosforos: 1, anzuelo: false, cuerda: 0, trampa: 0, veneno: false, piedraAfilada: false, comidaCocida: false }
    };
    document.getElementById("overlay").className = "";
    updateLog("Despiertas en una isla desierta. Sobrevive todo lo que puedas.", "neutral");
    renderGame();
    loadRecord();
}

function renderInventory() {
    var inv = state.inv;
    var html = '';
    html += '<div class="inv-item">🪵 Madera: <span>' + inv.madera + '</span></div>';
    html += '<div class="inv-item">🍖 Comida: <span>' + inv.comida + '</span></div>';
    html += '<div class="inv-item">💧 Agua: <span>' + inv.agua + '</span></div>';
    html += '<div class="inv-item">🧶 Cuerda: <span>' + inv.cuerda + '</span></div>';
    html += '<div class="inv-item">🔥 Fosforos: <span>' + inv.fosforos + '</span></div>';
    html += '<div class="inv-item">🗡️ Lanza: <span>' + (inv.lanza ? (inv.veneno ? "ENVENENADA" : (inv.piedraAfilada ? "MEJORADA" : "SI")) : "NO") + '</span></div>';
    html += '<div class="inv-item">🏠 Cabana: <span>' + (inv.cabana ? "SI" : "NO") + '</span></div>';
    if(inv.anzuelo) html += '<div class="inv-item">🪝 Anzuelo: <span>SI</span></div>';
    if(inv.trampa) html += '<div class="inv-item">🪤 Trampas: <span>' + inv.trampa + '</span></div>';
    document.getElementById('invDisplay').innerHTML = html;
}

function renderGame() {
    document.getElementById("sDia").textContent = state.dia;
    document.getElementById("sHp").textContent = Math.floor(state.hp);
    document.getElementById("sHam").textContent = Math.floor(state.hambre);
    document.getElementById("sSed").textContent = Math.floor(state.sed);
    document.getElementById("bHp").style.width = state.hp + "%";
    document.getElementById("bHam").style.width = state.hambre + "%";
    document.getElementById("bSed").style.width = state.sed + "%";

    renderInventory();

    var zone = ZONES[state.zone];
    document.getElementById("zoneName").textContent = zone.icon + " " + zone.name;

    var opts = document.getElementById("options");
    opts.innerHTML = "";
    zone.options.forEach(function(opt, i) {
        var btn = document.createElement("button");
        btn.className = "opt-btn";
        btn.textContent = opt.txt;
        btn.onclick = function() { doAction(i); };
        opts.appendChild(btn);
    });
}

function updateLog(msg, cls) {
    document.getElementById("log").innerHTML = '<span class="' + cls + '">' + msg + '</span>';
}

function doAction(idx) {
    var result = ZONES[state.zone].options[idx].fn(state);

    state.dia++;
    var hungerDrain = 11 + Math.random() * 8;
    var thirstDrain = 14 + Math.random() * 9;
    state.hambre = Math.max(0, state.hambre - hungerDrain);
    state.sed = Math.max(0, state.sed - thirstDrain);

    if(state.inv.cabana) state.hp = Math.min(100, state.hp + 5);
    if(state.hambre <= 0) state.hp -= 16;
    if(state.sed <= 0) state.hp -= 20;

    if(state.hambre < 20 && state.inv.comida > 0) {
        state.inv.comida--;
        var foodRestore = state.inv.comidaCocida ? 50 : 35;
        state.hambre = Math.min(100, state.hambre + foodRestore);
    }
    if(state.sed < 20 && state.inv.agua > 0) {
        state.inv.agua--;
        state.sed = Math.min(100, state.sed + 40);
    }

    var eventMsg = '';
    RANDOM_EVENTS.forEach(function(ev) {
        if(Math.random() < ev.chance) {
            var r = ev.fn(state);
            if(r) {
                if(state.inv.cabana && ev.cabin) ev.cabin(state);
                eventMsg += ' | ' + r;
            }
        }
    });

    state.hp = Math.max(0, Math.min(100, state.hp));

    var logMsg = result.msg;
    if(eventMsg) logMsg += '<br><span class="event">' + eventMsg.substring(3) + '</span>';
    if(state.hp < 25) logMsg += ' <span class="bad">HP CRITICO!</span>';
    if(state.hambre < 20 && state.inv.comida <= 0) logMsg += ' <span class="bad">Sin comida!</span>';
    if(state.sed < 20 && state.inv.agua <= 0) logMsg += ' <span class="bad">Sin agua!</span>';

    document.getElementById("log").innerHTML = '<span class="' + result.cls + '">' + logMsg + '</span>';

    if(state.hp <= 0) endGame('dead');
    else if(state.rescate) endGame('rescue');
    else if(state.escaped) endGame('escape');
    else renderGame();
}

function endGame(type) {
    var ov = document.getElementById("overlay");
    ov.className = "show";
    var dias = state.dia - 1;
    saveRecord(dias);

    if(type === 'dead') {
        ov.classList.add("dead");
        document.getElementById("oTitle").textContent = "HAS MUERTO";
        document.getElementById("oMsg").textContent = "Sobreviviste " + dias + " dias.";
        document.getElementById("oDetail").textContent = "Causa: " + (state.hambre <= 0 && state.sed <= 0 ? "Hambre y sed" : state.hambre <= 0 ? "Hambre" : state.sed <= 0 ? "Deshidratacion" : "Heridas");
    } else if(type === 'rescue') {
        ov.classList.add("win");
        document.getElementById("oTitle").textContent = "RESCATADO!";
        document.getElementById("oMsg").textContent = "Un barco te rescato el dia " + dias + ".";
        document.getElementById("oDetail").textContent = "Metodo: Senal de humo desde la montana";
    } else if(type === 'escape') {
        ov.classList.add("win");
        document.getElementById("oTitle").textContent = "ESCAPASTE!";
        document.getElementById("oMsg").textContent = "Navegaste a tierra firme el dia " + dias + ".";
        document.getElementById("oDetail").textContent = "Metodo: Balsa desde la playa oculta";
    }
}

resetGame();
</script>
</body>
</html>
