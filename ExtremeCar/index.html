<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Extreme Car PRO</title>

<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(#06131d,#001018);
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
color:#00ffd5;
margin:8px;
}

canvas{
background:#001018;
border:2px solid #00ffd5;
}

#ui{
position:fixed;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 10px;
font-size:14px;
}

.panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#07131b;
padding:20px;
border-radius:10px;
display:none;
}
button{
padding:6px 10px;
border:0;
border-radius:6px;
cursor:pointer;
background:#00ffd5;
}
</style>
</head>

<body>

<h1>🏎 EXTREME CAR PRO</h1>

<canvas id="c" width="480" height="640"></canvas>

<div id="ui">
<div id="stats">
P:0 | 💰0 | ⚡0
</div>
<div>
<button onclick="toggleCode()">🎁</button>
</div>
</div>

<div class="panel" id="codePanel">
<input id="codeInput" placeholder="codigo"/>
<button onclick="redeem()">OK</button>
<p id="msg"></p>
</div>

<script>

// ================= STATE =================
const c=document.getElementById("c");
const ctx=c.getContext("2d");

const W=480,H=640;
const lanes=[120,240,360];

let player={
lane:1,
x:240,
speed:0,
nitro:100
};

let cars=[];
let score=0;
let money=0;
let shake=0;

// ================= INPUT =================
let keys={};
document.onkeydown=e=>keys[e.key]=true;
document.onkeyup=e=>keys[e.key]=false;

// ================= SPAWN =================
function spawn(){
cars.push({
lane:Math.floor(Math.random()*3),
y:-100,
speed:2+Math.random()*3
});
}
setInterval(spawn,800);

// ================= UPDATE =================
function update(){

// movimiento jugador
if(keys["ArrowLeft"] && player.lane>0){
player.lane--;
keys["ArrowLeft"]=false;
}
if(keys["ArrowRight"] && player.lane<2){
player.lane++;
keys["ArrowRight"]=false;
}

// nitro
if(keys["ArrowUp"] && player.nitro>0){
player.speed=Math.min(18,player.speed+0.4);
player.nitro-=0.5;
}else{
player.speed=Math.max(0,player.speed-0.2);
player.nitro=Math.min(100,player.nitro+0.1);
}

// posición
player.x+= (lanes[player.lane]-player.x)*0.2;

// enemigos
for(let c of cars){
c.y += c.speed + player.speed;

// colisión
if(Math.abs(c.y-520)<40 && c.lane==player.lane){
shake=10;
player.speed=0;
}
}

// eliminar
cars=cars.filter(c=>c.y<H+100);

// score
score+=player.speed*0.1;
money+=0.05;

// shake
if(shake>0) shake--;

document.getElementById("stats").innerText=
"P:"+Math.floor(score)+" | 💰"+Math.floor(money)+" | ⚡"+Math.floor(player.nitro);
}

// ================= DRAW ROAD =================
function drawRoad(){

ctx.fillStyle="#001018";
ctx.fillRect(0,0,W,H);

let offset=0;

for(let i=0;i<20;i++){

let y=i*40+ (score*2)%40;
let w=200 + i*5;

ctx.fillStyle=i%2?"#0a1c24":"#0c2630";

ctx.fillRect(240-w/2,y,w,40);
}

}

// ================= DRAW =================
function draw(){

if(shake>0){
ctx.save();
ctx.translate(Math.random()*10-5,Math.random()*10-5);
}

drawRoad();

// player
ctx.fillStyle="#00ffd5";
ctx.fillRect(player.x-20,520,40,60);

// enemies
for(let c of cars){
ctx.fillStyle="#ff3b3b";
ctx.fillRect(lanes[c.lane]-20,c.y,40,60);
}

if(shake>0) ctx.restore();
}

// ================= LOOP =================
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// ================= CODES =================
function toggleCode(){
document.getElementById("codePanel").style.display="block";
}

function redeem(){
let v=document.getElementById("codeInput").value.toUpperCase();

if(v=="BOOST"){
player.speed=20;
msg("NITRO MAX");
}
else if(v=="MONEY"){
money+=500;
msg("+500");
}
else{
msg("ERROR");
}
}

function msg(t){
document.getElementById("msg").innerText=t;
}

</script>

</body>
</html>
