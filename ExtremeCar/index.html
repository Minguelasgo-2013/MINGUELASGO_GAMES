<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Extreme Car ULTRA PRO</title>

<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(#061522,#000);
font-family:Arial;
color:white;
text-align:center;
}

canvas{
background:#001018;
display:block;
margin:auto;
border:2px solid #00ffd5;
}

#ui{
position:fixed;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 10px;
font-size:14px;
}

.panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#081824;
padding:20px;
border-radius:10px;
display:none;
}
button{
padding:6px 10px;
border:0;
border-radius:6px;
background:#00ffd5;
}
</style>
</head>

<body>

<h2>🏎 ULTRA CAR NEXT LEVEL</h2>

<canvas id="c" width="480" height="640"></canvas>

<div id="ui">
<div id="stats">P:0 | 💰0 | ⚡0</div>
<div><button onclick="toggle()">🎁</button></div>
</div>

<div class="panel" id="panel">
<input id="code" placeholder="CODE"/>
<button onclick="redeem()">OK</button>
<p id="msg"></p>
</div>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

const W=480,H=640;

let player={
x:240,
lane:1,
speed:0,
nitro:100
};

let cars=[];
let score=0;
let money=0;
let shake=0;
let slow=0;

const lanes=[120,240,360];

// spawn más inteligente
function spawn(){
cars.push({
lane:Math.floor(Math.random()*3),
y:-100,
speed:2+Math.random()*4,
change:Math.random()<0.2
});
}

setInterval(spawn,700);

// INPUT
let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// UPDATE
function update(){

// lane smooth
if(keys["ArrowLeft"] && player.lane>0){
player.lane--; keys["ArrowLeft"]=false;
}
if(keys["ArrowRight"] && player.lane<2){
player.lane++; keys["ArrowRight"]=false;
}

player.x += (lanes[player.lane]-player.x)*0.25;

// nitro
if(keys["ArrowUp"] && player.nitro>0){
player.speed=Math.min(20,player.speed+0.5);
player.nitro-=0.4;
}else{
player.speed=Math.max(0,player.speed-0.15);
player.nitro+=0.05;
}

// enemies AI
for(let c of cars){

// cambio de carril IA
if(c.change && Math.random()<0.01){
c.lane += Math.random()<0.5?-1:1;
c.lane=Math.max(0,Math.min(2,c.lane));
}

c.y += c.speed + player.speed*0.6;

// colisión
if(Math.abs(c.y-520)<45 && c.lane==player.lane){
shake=12;
slow=10;
player.speed*=0.3;
}
}

// remove
cars=cars.filter(c=>c.y<H+100);

// score
score += player.speed*0.12;
money += 0.05;

// effects
if(shake>0) shake--;
if(slow>0) slow--;

// UI
document.getElementById("stats").innerText=
"P:"+Math.floor(score)+" 💰"+Math.floor(money)+" ⚡"+Math.floor(player.nitro);
}

// ROAD (pseudo 3D real)
function road(){

ctx.fillStyle="#001018";
ctx.fillRect(0,0,W,H);

let center=240;

for(let i=0;i<40;i++){

let y=i*20;
let perspective = y/H;

let width = 420 * (1-perspective);
let x = center - width/2;

ctx.fillStyle=i%2?"#0a1c24":"#0c2a36";

ctx.fillRect(x,y,width,20);
}
}

// DRAW
function draw(){

if(shake>0){
ctx.save();
ctx.translate(Math.random()*10-5,Math.random()*10-5);
}

road();

// player
ctx.fillStyle="#00ffd5";
ctx.fillRect(player.x-18,520,36,60);

// enemies
for(let c of cars){
ctx.fillStyle="#ff3b3b";
ctx.fillRect(lanes[c.lane]-18,c.y,36,60);
}

if(shake>0) ctx.restore();
}

// LOOP
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// CODES
function toggle(){
document.getElementById("panel").style.display="block";
}

function redeem(){
let v=document.getElementById("code").value.toUpperCase();

if(v=="BOOST"){
player.speed=22;
msg("NITRO MAX");
}
else if(v=="MONEY"){
money+=1000;
msg("+1000");
}
else if(v=="SLOWMO"){
slow=30;
msg("SLOWMO!");
}
else{
msg("FAIL");
}
}

function msg(t){
document.getElementById("msg").innerText=t;
}

</script>

</body>
</html>
